<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Architect Sanctuary</title>
<style>
:root { 
    --bg-dark: #0a0a0a; 
    --text: #e8e6e3; 
    --glass: rgba(255, 255, 255, 0.06); 
    --glass-border: rgba(255, 255, 255, 0.1);
}

body { 
    margin: 0; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    color: var(--text); 
    text-align: center; 
    transition: background 0.8s, opacity 0.5s; 
    height: 100vh; 
    overflow: hidden; 
    background: #0f1624;
}

/* Chromatic States */
body.yellow { background: linear-gradient(180deg, #3a3a1a, #1f1f0f); }
body.red { background: linear-gradient(180deg, #3a1a1a, #1a0f0f); }
body.orange { background: linear-gradient(180deg, #3a261a, #1f140f); }
body.purple { background: linear-gradient(180deg, #2a1a3a, #140f1f); }
body.blue { background: linear-gradient(180deg, #1a253a, #0f1624); }
body.level-zero { background: #000 !important; }

#app { 
    max-width: 420px; 
    margin: auto; 
    padding: 20px; 
    height: 85vh; 
    overflow-y: auto; 
    scrollbar-width: none;
}
#app::-webkit-scrollbar { display: none; }

.shrouded #app { opacity: 0.05; pointer-events: none; }
.shrouded #shroudOverlay { display: flex !important; }

h2 { font-weight: 200; letter-spacing: 4px; text-transform: lowercase; margin: 30px 0; }

.btn { 
    margin: 10px 0; 
    padding: 18px; 
    border-radius: 20px; 
    background: var(--glass); 
    border: 1px solid var(--glass-border); 
    cursor: pointer; 
    backdrop-filter: blur(10px); 
    transition: 0.2s;
    font-weight: 300;
}
.btn:active { transform: scale(0.97); background: rgba(255,255,255,0.15); }

input, textarea { 
    width: 90%; 
    padding: 14px; 
    margin: 8px 0; 
    border-radius: 12px; 
    border: 1px solid var(--glass-border); 
    background: rgba(0, 0, 0, 0.4); 
    color: white; 
    text-align: center; 
    font-family: inherit;
}

#shroudOverlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    display: none; z-index: 100; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    background: inherit; 
}

#timer { font-size: 72px; font-weight: 100; margin: 20px 0; }

.tabbar { 
    position: fixed; bottom: 0; width: 100%; max-width: 420px; 
    left: 50%; transform: translateX(-50%); 
    display: flex; justify-content: space-around; 
    background: rgba(0, 0, 0, 0.95); 
    padding: 20px 0 35px 0; 
}

.tab { opacity: 0.4; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
.tab.active { opacity: 1; font-weight: bold; }

.ripple-badge { font-size: 10px; color: #ffaa00; margin-bottom: 15px; display: none; text-transform: uppercase; letter-spacing: 2px;}
</style>
</head>
<body class="blue">

<div id="shroudOverlay">
    <p id="shroudAnchor" style="font-style: italic; opacity: 0.6; font-size: 14px;"></p>
    <h3 id="shroudStep" style="font-weight: 300;"></h3>
    <div id="timer">---</div>
    <div class="btn" style="width: 200px;" onclick="advanceStep()">Confirm</div>
</div>

<div id="app">
    <div id="home" class="view">
        <div id="rippleBadge" class="ripple-badge"></div>
        <h2>pilot</h2>
        <div id="streak" style="font-size: 11px; opacity: 0.5; margin-bottom: 20px;"></div>

        <div class="btn" onclick="nav('clarity')">Hunt the Fox</div>
        <div class="btn" onclick="nav('dump')">The Descent</div>
        
        <div style="margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
            <div class="btn" style="color: #ff5555; border-color: rgba(255,0,0,0.1);" onclick="triggerLevelZero()">Level 0 Reset</div>
            <div class="btn" style="border-color: rgba(100,200,255,0.2);" onclick="sendSafetySignal()">Send Offline Signal</div>
        </div>
    </div>

    <div id="clarity" class="view" style="display:none;">
        <h2>hunt</h2>
        <input id="fox" placeholder="fox">
        <input id="unzip" placeholder="steps (comma separated)">
        <div style="margin: 20px 0;">
            <span style="font-size: 24px; cursor: pointer; margin: 0 10px;" onclick="pickState('red')">🔴</span>
            <span style="font-size: 24px; cursor: pointer; margin: 0 10px;" onclick="pickState('orange')">🟠</span>
            <span style="font-size: 24px; cursor: pointer; margin: 0 10px;" onclick="pickState('purple')">🟣</span>
            <span style="font-size: 24px; cursor: pointer; margin: 0 10px;" onclick="pickState('blue')">🔵</span>
        </div>
        <div class="btn" onclick="activateHunt()">Engage Shroud</div>
    </div>

    <div id="dump" class="view" style="display:none;">
        <h2>descent</h2>
        <textarea id="dumpInput" rows="10" placeholder="Empty the RAM..."></textarea>
        <div class="btn" onclick="processDump()">Clear Loops</div>
    </div>
</div>

<div class="tabbar">
    <div class="tab active" id="t-home" onclick="nav('home')">home</div>
    <div class="tab" id="t-clarity" onclick="nav('clarity')">hunt</div>
    <div class="tab" id="t-dump" onclick="nav('dump')">descent</div>
</div>

<script>
let state = 'blue';
let steps = [];
let currentIdx = 0;
let timerInt;

const protocols = {
    red: ["Ice water on face", "8oz Water", "Visual silence check"],
    orange: ["Grounding 5-4-3-2-1", "Say 'I am safe'", "Lower shoulders"],
    purple: ["Externalize loops", "Identify one movement"],
    blue: ["Low energy protocol", "Weighted blanket check"]
};

const anchors = {
    red: "Be still. Logic is offline.",
    orange: "You are fearfully and wonderfully made. Safe.",
    purple: "He is not the author of confusion.",
    blue: "Rest is the designated task."
};

function nav(id) {
    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('t-' + id).classList.add('active');
    checkRipple();
}

function pickState(s) {
    state = s;
    document.body.className = s;
    if (s === 'red' || s === 'orange') localStorage.setItem('rippleStart', Date.now());
}

function checkRipple() {
    let r = localStorage.getItem('rippleStart');
    if (r) {
        let hours = (Date.now() - r) / 3600000;
        if (hours < 72) {
            document.getElementById('rippleBadge').style.display = 'block';
            document.getElementById('rippleBadge').innerText = `⚠️ Recovery: Day ${Math.ceil(hours / 24)}/3`;
        } else {
            document.getElementById('rippleBadge').style.display = 'none';
        }
    }
}

function activateHunt() {
    let fox = document.getElementById('fox').value || "task";
    let raw = document.getElementById('unzip').value.trim();
    let extra = raw ? raw.split(',').map(x => x.trim()).filter(Boolean) : [];

    steps = [...(protocols[state] || []), ...extra, `2-Min Sprint: ${fox}`];
    currentIdx = 0;
    saveHunt();
    document.body.classList.add('shrouded');
    document.getElementById('shroudAnchor').innerText = anchors[state] || "";
    showStep();
}

function showStep() {
    document.getElementById('shroudStep').innerText = steps[currentIdx];
    if (steps[currentIdx].includes('2-Min')) {
        startTimer(120);
    } else {
        document.getElementById('timer').innerText = "---";
    }
}

function advanceStep() {
    currentIdx++;
    if (currentIdx < steps.length) {
        saveHunt();
        showStep();
    } else {
        clearHunt();
        document.body.classList.remove('shrouded');
        clearInterval(timerInt);
        updateStreak();
        nav('home');
    }
}

function startTimer(s) {
    clearInterval(timerInt);
    let t = s;
    timerInt = setInterval(() => {
        let m = Math.floor(t / 60);
        let sec = t % 60;
        document.getElementById('timer').innerText = `${m}:${sec < 10 ? '0' : ''}${sec}`;
        if (t-- <= 0) {
            clearInterval(timerInt);
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            document.getElementById('timer').innerText = "DONE";
        }
    }, 1000);
}

function saveHunt() {
    localStorage.setItem('steps', JSON.stringify(steps));
    localStorage.setItem('idx', currentIdx);
}

function clearHunt() {
    localStorage.removeItem('steps');
    localStorage.removeItem('idx');
}

function loadHunt() {
    let s = JSON.parse(localStorage.getItem('steps') || "[]");
    let i = parseInt(localStorage.getItem('idx'));
    if (s.length) {
        steps = s;
        currentIdx = i || 0;
        document.body.classList.add('shrouded');
        showStep();
    }
}

function updateStreak() {
    let today = new Date().toDateString();
    let last = localStorage.getItem('last');
    if (last !== today) {
        let streak = parseInt(localStorage.getItem('streak') || 0) + 1;
        localStorage.setItem('streak', streak);
        localStorage.setItem('last', today);
    }
    document.getElementById('streak').innerText = "ARCHITECT STREAK: " + (localStorage.getItem('streak') || 0) + " DAYS";
}

function triggerLevelZero() {
    document.body.className = 'level-zero';
    document.getElementById('app').innerHTML = `<h2 style="margin-top:40vh">RESETTING...</h2><p>Darkness. Compression. Sleep.</p><div class="btn" onclick="location.reload()">Return</div>`;
}

function sendSafetySignal() {
    const message = encodeURIComponent("Architect Protocol: I have hit Level 0. I am safe but going offline for recovery.");
    window.location.href = `sms:?&body=${message}`;
}

function processDump() {
    document.getElementById('dumpInput').value = "";
    nav('home');
}

updateStreak();
loadHunt();
nav('home');
</script>
</body>
</html>
