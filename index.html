<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 overflow:hidden;
 font-family:-apple-system;
 color:#e8e6e3;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 background:#050505;
}

/* 🌌 GLOW */
#glow{
 position:fixed;
 width:200%;
 height:200%;
 top:-50%;
 left:-50%;
 background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
 animation: drift 25s infinite linear;
}

@keyframes drift{
 0%{transform:translate(0,0);}
 50%{transform:translate(30px,30px);}
 100%{transform:translate(0,0);}
}

/* ✨ PARTICLES */
.particle{
 position:fixed;
 width:3px;
 height:3px;
 background:white;
 border-radius:50%;
 opacity:.15;
 animation: float linear infinite;
}

@keyframes float{
 from{transform:translateY(100vh);}
 to{transform:translateY(-10vh);}
}

/* 👆 RIPPLE */
.ripple{
 position:fixed;
 border-radius:50%;
 border:1px solid rgba(255,255,255,0.2);
 transform:translate(-50%,-50%);
 animation:ripple 1s ease-out forwards;
 pointer-events:none;
}

@keyframes ripple{
 from{width:0;height:0;opacity:.6;}
 to{width:200px;height:200px;opacity:0;}
}

/* UI */
#app{position:relative;z-index:2;max-width:360px;width:100%;text-align:center;}

.choice{
 margin:10px 0;
 padding:14px;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
}

.breath{
 width:150px;height:150px;margin:20px auto;border-radius:50%;
 background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
 animation:breathe 8s infinite ease-in-out;
}

@keyframes breathe{
 0%{transform:scale(.8);}
 50%{transform:scale(1.25);}
 100%{transform:scale(.8);}
}

.small{
 margin-top:10px;
 padding:10px;
 border:none;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
 color:white;
}
</style>
</head>

<body>

<div id="glow"></div>

<div id="app">

<!-- HOME -->
<div id="home">
<h2>return</h2>
<div class="choice" onclick="nav('select')">begin</div>
<div class="choice" onclick="toggleSound()">sound</div>
</div>

<!-- SELECT -->
<div id="select" style="display:none;">
<h2>what are you feeling</h2>

<div class="choice" onclick="start(['heat'])">overwhelmed</div>
<div class="choice" onclick="start(['threat'])">anxious</div>
<div class="choice" onclick="start(['pressure'])">pressure</div>
<div class="choice" onclick="start(['gravity'])">low</div>
<div class="choice" onclick="start(['static'])">scattered</div>

<button class="small" onclick="nav('home')">back</button>
</div>

<!-- FLOW -->
<div id="flow" style="display:none;">
<div class="breath"></div>
<div id="text"></div>
</div>

</div>

<script>

// 🌌 PARTICLES
for(let i=0;i<35;i++){
 let p=document.createElement("div");
 p.className="particle";
 p.style.left=Math.random()*100+"vw";
 p.style.animationDuration=(10+Math.random()*20)+"s";
 document.body.appendChild(p);
}

// 👆 RIPPLE (only on background)
document.body.addEventListener("click", function(e){
 if(e.target.classList.contains("choice") || e.target.classList.contains("small")) return;

 let r=document.createElement("div");
 r.className="ripple";
 r.style.left=e.clientX+"px";
 r.style.top=e.clientY+"px";
 document.body.appendChild(r);
 setTimeout(()=>r.remove(),1000);
});

// NAV
function nav(id){
 clearInterval(interval);
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById(id).style.display="block";
}

// 🌊 FLOW
let steps=[],i=0,interval;

function start(state){
 nav("flow");
 build(state);
 i=0;
 run();
}

function build(state){
 steps=[];

 if(state.includes("heat")){
  steps.push("this is a lot");
  steps.push("your system is overwhelmed");
 }

 if(state.includes("threat")){
  steps.push("your mind is trying to protect you");
 }

 steps.push("slow your breathing");
 steps.push("you are safe");
 steps.push("stay here");
}

function run(){
 show();
 interval=setInterval(()=>{
  i++;
  if(i<steps.length){
   show();
  } else {
   nav("home");
  }
 },4000);
}

function show(){
 document.getElementById("text").innerText=steps[i];
}

// 🎧 SOUND (FIXED FOR iPHONE)
let audioCtx=null;

function toggleSound(){
 if(!audioCtx){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();

  let osc=audioCtx.createOscillator();
  let gain=audioCtx.createGain();

  osc.type="sine";
  osc.frequency.value=110;

  gain.gain.value=0.02;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

 } else {
  audioCtx.close();
  audioCtx=null;
 }
}

</script>

</body>
</html>
