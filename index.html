<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 overflow:hidden;
 font-family:-apple-system;
 color:#e8e6e3;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 background:#050505;
}

/* 🌌 BACKGROUND */
#glow{
 position:fixed;
 width:200%;
 height:200%;
 top:-50%;
 left:-50%;
 background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
 animation: drift 25s infinite linear;
}

@keyframes drift{
 0%{transform:translate(0,0);}
 50%{transform:translate(40px,40px);}
 100%{transform:translate(0,0);}
}

/* ✨ PARTICLES */
.particle{
 position:fixed;
 width:3px;
 height:3px;
 background:white;
 border-radius:50%;
 opacity:.2;
 animation: float linear infinite;
}

@keyframes float{
 from{transform:translateY(100vh);}
 to{transform:translateY(-10vh);}
}

/* 👆 RIPPLE */
.ripple{
 position:fixed;
 border-radius:50%;
 border:1px solid rgba(255,255,255,0.2);
 transform:translate(-50%,-50%);
 animation:ripple 1s ease-out forwards;
}

@keyframes ripple{
 from{width:0;height:0;opacity:.6;}
 to{width:200px;height:200px;opacity:0;}
}

/* APP */
#app{position:relative;z-index:2;max-width:360px;width:100%;text-align:center;}

.choice{
 margin:10px 0;
 padding:14px;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
}

.breath{
 width:160px;height:160px;margin:20px auto;border-radius:50%;
 background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
 animation:breathe 8s infinite ease-in-out;
}

@keyframes breathe{
 0%{transform:scale(.8);}
 50%{transform:scale(1.3);}
 100%{transform:scale(.8);}
}

.small{
 margin-top:10px;
 padding:10px;
 border:none;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
 color:white;
}
</style>
</head>

<body onclick="createRipple(event)">

<div id="glow"></div>

<div id="app">

<!-- HOME -->
<div id="home">
<h2>return</h2>
<div class="choice" onclick="nav('select')">begin</div>
<div class="choice" onclick="toggleSound()">sound on/off</div>
</div>

<!-- SELECT -->
<div id="select" style="display:none;">
<h2>what are you feeling</h2>

<div class="choice" onclick="start()">enter</div>
</div>

<!-- FLOW -->
<div id="flow" style="display:none;">
<div class="breath"></div>
<div id="text"></div>
</div>

</div>

<script>

// 🌌 PARTICLES
for(let i=0;i<40;i++){
 let p=document.createElement("div");
 p.className="particle";
 p.style.left=Math.random()*100+"vw";
 p.style.animationDuration=(10+Math.random()*20)+"s";
 document.body.appendChild(p);
}

// 👆 RIPPLE EFFECT
function createRipple(e){
 let r=document.createElement("div");
 r.className="ripple";
 r.style.left=e.clientX+"px";
 r.style.top=e.clientY+"px";
 document.body.appendChild(r);
 setTimeout(()=>r.remove(),1000);
}

// NAV
function nav(id){
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById(id).style.display="block";
}

// FLOW
function start(){
 nav("flow");
 steps=["pause","breathe slowly","you are safe","stay here"];
 i=0;
 run();
}

let steps=[],i=0,int;

function run(){
 show();
 int=setInterval(()=>{
  i++;
  if(i<steps.length) show();
  else nav("home");
 },4000);
}

function show(){
 document.getElementById("text").innerText=steps[i];
}

// 🎧 SOUND (AMBIENT)
let audioCtx,osc,gainNode;

function toggleSound(){
 if(!audioCtx){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  osc=audioCtx.createOscillator();
  gainNode=audioCtx.createGain();

  osc.type="sine";
  osc.frequency.value=110;

  gainNode.gain.value=0.02;

  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  osc.start();
 } else {
  audioCtx.close();
  audioCtx=null;
 }
}

</script>

</body>
</html>
