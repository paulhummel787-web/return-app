<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architect OS ∞ V14</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>
:root{
 --green:#4ade80; --red:#f87171; --yellow:#facc15;
 --blue:#60a5fa; --bg:#020617; --card:rgba(30,41,59,0.5);
}

body{margin:0;font-family:-apple-system;background:var(--bg);color:white;text-align:center;}
.dashboard{padding:20px;max-width:420px;margin:auto;}

.card{background:var(--card);border-radius:20px;padding:20px;margin-bottom:15px;}

.btn{
 padding:14px;margin:6px 0;border-radius:10px;
 border:none;width:100%;font-weight:bold;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.mode{
 font-size:18px;
 letter-spacing:3px;
 margin-bottom:10px;
}
</style>
</head>

<body>

<div class="dashboard">

<div class="card">
<div id="mode" class="mode">MODE</div>
<p id="status"></p>
</div>

<div class="card">
<h3>Log State</h3>
<div class="grid">
<button class="btn" onclick="log('YELLOW')">Static</button>
<button class="btn" onclick="log('RED')">Heat</button>
<button class="btn" onclick="log('BLUE')">Shutdown</button>
<button class="btn" onclick="log('GREEN')">Win</button>
</div>
</div>

<div class="card">
<h3>Mode Actions</h3>
<div id="actions"></div>
</div>

<div class="card">
<button class="btn" onclick="reset()">Reset System</button>
</div>

</div>

<script>

// ---------- DATA ----------
const WEIGHTS={YELLOW:8,RED:15,BLUE:16,GREEN:18};

// ---------- LOG ----------
function log(state){
 let d=JSON.parse(localStorage.log||"[]");
 d.push({t:Date.now(),state});
 localStorage.log=JSON.stringify(d);
 update();
}

// ---------- GET TODAY ----------
function getToday(){
 let d=JSON.parse(localStorage.log||"[]");
 let today=new Date().toDateString();
 return d.filter(e=>new Date(e.t).toDateString()===today);
}

// ---------- MODE DETECTION ----------
function detectMode(){

 let d=getToday().slice(-3);

 if(d.length>=3 && d.every(e=>e.state==="RED"))
  return "RECOVERY";

 if(d.length>=2 && d.every(e=>e.state==="BLUE"))
  return "RESET";

 let score=d.reduce((s,e)=>s+(WEIGHTS[e.state]||10),0);

 if(score>40) return "WORK";

 return "SPIRITUAL";
}

// ---------- ACTIONS ----------
function renderActions(mode){

 let box=document.getElementById("actions");
 box.innerHTML="";

 let actions=[];

 if(mode==="WORK"){
  actions=["Start Deep Work","Finish Task","Avoid Distraction"];
 }

 if(mode==="RECOVERY"){
  actions=["Cold Water","Breathing","Sit Down"];
 }

 if(mode==="SPIRITUAL"){
  actions=["Pray","Reflect","Read Scripture"];
 }

 if(mode==="RESET"){
  actions=["Lie Down","No Input","Full Stop"];
 }

 actions.forEach(a=>{
  let b=document.createElement("button");
  b.className="btn";
  b.innerText=a;
  box.appendChild(b);
 });
}

// ---------- UPDATE ----------
function update(){

 let mode=detectMode();

 document.getElementById("mode").innerText=mode;

 let status="";

 if(mode==="WORK") status="Execution mode active";
 if(mode==="RECOVERY") status="Regulation required";
 if(mode==="SPIRITUAL") status="Center yourself";
 if(mode==="RESET") status="System override";

 document.getElementById("status").innerText=status;

 renderActions(mode);
}

// ---------- RESET ----------
function reset(){
 if(confirm("Reset all data?")){
  localStorage.clear();
  location.reload();
 }
}

// ---------- PWA ----------
if("serviceWorker" in navigator){
 navigator.serviceWorker.register("sw.js");
}

update();

</script>
</body>
</html>
