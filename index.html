<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architect OS</title>
<link rel="manifest" href="manifest.json">

<style>
:root { --blue:#60a5fa; --red:#f87171; --green:#4ade80; }

body {
    margin:0; font-family:monospace;
    background:#020617; color:white; text-align:center;
}

/* glitch */
.glitch { animation: shake 0.2s infinite; color: var(--red); }
@keyframes shake {
    0%{transform:translate(0);}
    50%{transform:translate(2px,-2px);}
    100%{transform:translate(0);}
}

.glitch-distort { animation: distort 0.2s infinite; }
@keyframes distort {
    0%{transform:skew(0);}
    50%{transform:skew(3deg);}
    100%{transform:skew(0);}
}

.btn {
    padding:15px; margin:10px auto;
    border:1px solid #fff2; cursor:pointer;
    max-width:200px;
}

#shroud {
    position:fixed; inset:0;
    background:black; display:none;
    justify-content:center; align-items:center;
    flex-direction:column;
}

#timer { font-size:50px; color:var(--blue); }
</style>
</head>

<body>

<h2 id="level">ARCHITECT_OS</h2>
<p id="streak">STREAK: 0</p>

<input id="foxInput" placeholder="TARGET">

<div class="btn" onclick="startHunt('red')">RED</div>
<div class="btn" onclick="startHunt('blue')">BLUE</div>

<p id="insight">STATUS</p>

<div id="shroud">
    <h2 id="step"></h2>
    <div id="timer"></div>
    <div class="btn" onclick="nextStep()">CONTINUE</div>
    <div class="btn" onclick="endSession(false)">ABORT</div>
</div>

<script>
let steps=[], i=0, timer, huntActive=false;
let lastActivity=Date.now();
let escalationLevel=0;
let audioCtx;

/* AUDIO */
function playTone(freq,d){
    if(!audioCtx) audioCtx=new AudioContext();
    let o=audioCtx.createOscillator();
    let g=audioCtx.createGain();
    o.frequency.value=freq;
    g.gain.value=0.05;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+d);
}

/* NOTIFICATIONS */
if ("Notification" in window) Notification.requestPermission();

function sendSmartNotification(msg){
    if(Notification.permission!=="granted") return;

    navigator.serviceWorker.getRegistration().then(reg=>{
        if(reg){
            reg.showNotification("ARCHITECT OS",{
                body:msg,
                vibrate:[200,100,200],
                tag:"alert",
                renotify:true
            });
        }
    });
}

/* PROTOCOLS */
const base={
    red:["MOVE","CLEAR","FOCUS"],
    blue:["CALM","ALIGN","BREATH"]
};

/* START */
function startHunt(type){
    huntActive=true;
    playTone(200,0.1);

    enforceLock();

    let fox=document.getElementById("foxInput").value||"EXECUTE";

    let d=JSON.parse(localStorage.sessions||"[]");
    let fails=d.slice(-5).filter(s=>!s.completed).length;

    if(fails>=3){
        steps=["SMALL STEP","JUST START","2 MIN: "+fox];
    } else {
        let extra=prompt("SUBTASKS","STEP1,STEP2");
        let arr=extra?extra.split(","):["START"];
        steps=[...base[type],...arr,"2 MIN: "+fox];
    }

    i=0;
    document.getElementById("shroud").style.display="flex";
    runStep();
    logStart(type,fox);
}

/* STEPS */
function runStep(){
    document.getElementById("step").innerText=steps[i];
    if(steps[i].includes("2 MIN")) startTimer(120);
}

function nextStep(){
    i++;
    playTone(600,0.05);
    if(i<steps.length) runStep();
    else endSession(true);
}

/* TIMER */
function startTimer(s){
    clearInterval(timer);
    let t=s;
    timer=setInterval(()=>{
        let m=Math.floor(t/60),sec=t%60;
        document.getElementById("timer").innerText=
        `${m}:${sec<10?'0':''}${sec}`;
        if(t--<=0){
            clearInterval(timer);
            endSession(true);
        }
    },1000);
}

/* END */
function endSession(success){
    huntActive=false;
    clearInterval(timer);
    document.getElementById("shroud").style.display="none";

    if(success){
        rewardPulse();
        updateStreak();
    } else {
        triggerGlitch();
    }

    logEnd(success);
    updateUI();
}

/* GLITCH */
function triggerGlitch(){
    document.body.classList.add("glitch-distort");
    setTimeout(()=>document.body.classList.remove("glitch-distort"),1000);
}

/* LOCK */
function enforceLock(){
    if(document.body.requestFullscreen){
        document.body.requestFullscreen().catch(()=>{});
    }
}

/* DATA */
function logStart(type,fox){
    let d=JSON.parse(localStorage.sessions||"[]");
    d.push({t:Date.now(),type,fox,completed:false});
    localStorage.sessions=JSON.stringify(d);
}

function logEnd(success){
    let d=JSON.parse(localStorage.sessions||"[]");
    if(d.length) d[d.length-1].completed=success;
    localStorage.sessions=JSON.stringify(d);
}

/* STREAK */
function updateStreak(){
    let today=new Date().toDateString();
    if(localStorage.last!==today){
        localStorage.streak=(+localStorage.streak||0)+1;
        localStorage.last=today;
    }
}

/* SCORE */
function focusScore(){
    let d=JSON.parse(localStorage.sessions||"[]");
    if(!d.length) return 0;
    let s=d.filter(x=>x.completed).length;
    return Math.round((s/d.length)*100);
}

/* PATTERN */
function pattern(){
    let d=JSON.parse(localStorage.sessions||"[]").slice(-5);
    if(d.every(x=>!x.completed)) return "OVERLOAD";
    if(d.filter(x=>x.completed).length>=4) return "HIGH PERFORMANCE";
}

/* UI */
function updateUI(){
    document.getElementById("streak").innerText="STREAK: "+(localStorage.streak||0);
    document.getElementById("level").innerText="FOCUS: "+focusScore()+"%";

    let p=pattern();
    document.getElementById("insight").innerText=p||"ACTIVE";
}

/* IDLE SYSTEM */
["click","keydown","touchstart"].forEach(e=>{
    document.addEventListener(e,()=>{
        lastActivity=Date.now();
        escalationLevel=0;
    });
});

setInterval(()=>{
    let idle=Date.now()-lastActivity;

    if(idle>120000 && !huntActive){
        escalationLevel++;

        let msgs=[
            "SYSTEM IDLE",
            "YOU ARE DRIFTING",
            "RETURN NOW",
            "ACTION REQUIRED"
        ];

        playTone(150+escalationLevel*100,0.2);

        sendSmartNotification(
            msgs[Math.min(escalationLevel-1,msgs.length-1)]
        );

        triggerGlitch();
        lastActivity=Date.now();
    }
},10000);

/* SW */
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}

updateUI();
</script>

</body>
</html>
