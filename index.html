<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:-apple-system;
 background:#050505;
 color:#e8e6e3;
 text-align:center;
 transition:background 0.8s ease;
}

body.yellow{background:#3a3a1a;}
body.red{background:#3a1a1a;}
body.orange{background:#3a261a;}
body.purple{background:#2a1a3a;}
body.blue{background:#1a253a;}

#app{max-width:420px;margin:auto;padding:20px;}

.btn{
 margin:8px 0;
 padding:14px;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
}

input{
 width:90%;
 padding:10px;
 margin:5px 0;
 border-radius:10px;
 border:none;
}

.breath{
 width:120px;height:120px;margin:20px auto;border-radius:50%;
 background:radial-gradient(circle,rgba(255,255,255,0.2),transparent);
 animation:breathe 6s infinite;
}

@keyframes breathe{
 0%{transform:scale(.8);}
 50%{transform:scale(1.25);}
 100%{transform:scale(.8);}
}

.tabbar{
 position:fixed;
 bottom:0;
 width:100%;
 max-width:420px;
 display:flex;
 justify-content:space-around;
 background:#111;
 padding:10px 0;
}

.tab{font-size:12px;opacity:0.6;}
.tab.active{opacity:1;}

#lock{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:#000;
 color:white;
 display:none;
 align-items:center;
 justify-content:center;
 font-size:20px;
}
</style>
</head>

<body>

<div id="app">

<div id="home">
<h2>return</h2>
<div class="btn" onclick="nav('reset')">reset</div>
<div class="btn" onclick="nav('clarity')">run my day</div>
<div class="btn" onclick="nav('emergency')">emergency</div>
<div class="btn" onclick="lockMode()">lockscreen</div>
</div>

<div id="reset" style="display:none;">
<h2>state</h2>
<div class="btn" onclick="setState('yellow')">🟡</div>
<div class="btn" onclick="setState('red')">🔴</div>
<div class="btn" onclick="setState('orange')">🟠</div>
<div class="btn" onclick="setState('purple')">🟣</div>
<div class="btn" onclick="setState('blue')">🔵</div>
<div class="breath"></div>
<div id="resetText"></div>
</div>

<div id="emergency" style="display:none;">
<h2>emergency</h2>
<div class="btn" onclick="emergency('red')">🔴</div>
<div class="btn" onclick="emergency('orange')">🟠</div>
<div class="btn" onclick="emergency('purple')">🟣</div>
<div class="btn" onclick="emergency('blue')">🔵</div>
<div class="btn" onclick="emergency('yellow')">🟡</div>
<div id="emergencyText"></div>
</div>

<div id="clarity" style="display:none;">
<h2>clarity</h2>
<input id="fox" placeholder="your fox">
<div class="btn" onclick="pickState('yellow',this)">🟡</div>
<div class="btn" onclick="pickState('red',this)">🔴</div>
<div class="btn" onclick="pickState('orange',this)">🟠</div>
<div class="btn" onclick="pickState('purple',this)">🟣</div>
<div class="btn" onclick="pickState('blue',this)">🔵</div>
<div class="btn" onclick="runDay()">run</div>
<div id="clarityText"></div>
</div>

<div id="insight" style="display:none;">
<h2>insight</h2>
<div id="insightText"></div>
</div>

</div>

<div id="lock" onclick="exitLock()">tap to exit</div>

<div class="tabbar">
<div class="tab active" onclick="nav('home',this)">home</div>
<div class="tab" onclick="nav('reset',this)">reset</div>
<div class="tab" onclick="nav('clarity',this)">clarity</div>
<div class="tab" onclick="nav('insight',this)">insight</div>
</div>

<script>

function nav(id,el){
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById(id).style.display="block";

 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 if(el) el.classList.add("active");

 if(id==="insight") updateInsight();
}

// STATE
function setState(s){
 document.body.className=s;

 let text={
  red:"cold water + breathe",
  orange:"you are safe",
  purple:"write it down",
  blue:"rest",
  yellow:"reduce input"
 };

 resetText.innerText=text[s];
 save(s);
}

// EMERGENCY
function emergency(s){
 setState(s);
 emergencyText.innerText="1 step only";
}

// CLARITY
let currentState=null;

function pickState(s,el){
 currentState=s;
 document.querySelectorAll("#clarity .btn").forEach(b=>b.classList.remove("active"));
 el.classList.add("active");
}

// 🪜 AUTO MVS
function generateSteps(task){

 let steps=[
  "open it",
  "write 1 line",
  "work for 2 minutes",
  "continue if able"
 ];

 return steps.map(s=>task+" → "+s).join("\n");
}

// 🧠 PREDICT
function predictState(data){

 let last=data.slice(-3).map(d=>d.state);

 if(last.includes("purple") && last.includes("red")){
  return "⚠️ trending toward overwhelm";
 }

 if(last.includes("yellow") && last.includes("purple")){
  return "⚠️ overload building";
 }

 return "";
}

function runDay(){

 let fox=document.getElementById("fox").value || "task";

 let msg="";

 if(currentState==="red"){
  msg="regulate first\n\nthen:\n"+generateSteps(fox);
 }
 else{
  msg=generateSteps(fox);
 }

 clarityText.innerText=msg;

 save(currentState||"unknown");
}

// SAVE
function save(s){
 let d=JSON.parse(localStorage.getItem("data")||"[]");
 d.push({state:s,time:Date.now()});
 localStorage.setItem("data",JSON.stringify(d));
}

// INSIGHT
function updateInsight(){

 let d=JSON.parse(localStorage.getItem("data")||"[]");

 if(d.length<3){
  insightText.innerText="build data";
  return;
 }

 let p=predictState(d);

 insightText.innerText=p || "stable pattern";
}

// 🔒 LOCK MODE
function lockMode(){
 document.getElementById("lock").style.display="flex";
 document.getElementById("lock").innerText="breathe\n\n1 step only";
}

function exitLock(){
 document.getElementById("lock").style.display="none";
}

</script>

</body>
</html>
