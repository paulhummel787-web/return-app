<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:-apple-system;
 color:white;
 text-align:center;
 background:#020617;
 transition:0.5s;
}

.container{max-width:420px;margin:auto;padding:20px;}

.card{
 background:rgba(30,41,59,0.6);
 border-radius:16px;
 padding:15px;
 margin:10px 0;
}

.btn{
 padding:14px;
 margin:8px 0;
 border-radius:10px;
 background:#1e293b;
}

canvas{
 width:100%;
 height:150px;
 background:#020617;
 border-radius:10px;
 margin-top:10px;
}

textarea{
 width:100%;
 height:80px;
 border-radius:10px;
 margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- DASHBOARD -->
<div class="card">
<h3 id="name"></h3>
<div id="identity"></div>
<div id="streak"></div>
<div id="insight"></div>
</div>

<!-- STATE -->
<div class="card">
<h3 id="mode">STATE</h3>
<div id="main">Select your state</div>
</div>

<!-- BUTTONS -->
<div id="buttons" class="card">
<div class="btn" onclick="enterState('RED')">Overload</div>
<div class="btn" onclick="enterState('PURPLE')">Overthinking</div>
<div class="btn" onclick="enterState('BLUE')">Shutdown</div>
<div class="btn" onclick="enterState('YELLOW')">Chaos</div>
<div class="btn" onclick="enterState('GREEN')">Clear</div>
</div>

<!-- BRAIN DUMP -->
<div class="card">
<h3>Brain Dump</h3>
<textarea id="dump"></textarea>
<div class="btn" onclick="processDump()">Process</div>
<div id="result"></div>
</div>

<!-- CHECK IN -->
<div class="card">
<div class="btn" onclick="dailyCheck()">Daily Check-In</div>
</div>

<!-- GRAPH -->
<div class="card">
<h3>State Trend</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

// ---------- SPEAK ----------
function speak(t){
 let msg=new SpeechSynthesisUtterance(t);
 msg.rate=0.9;
 speechSynthesis.cancel();
 speechSynthesis.speak(msg);
}

// ---------- STORAGE ----------
function getLog(){
 return JSON.parse(localStorage.log||"[]");
}

// ---------- IDENTITY ----------
function getIdentity(){
 return JSON.parse(localStorage.identity||"{}");
}

function setIdentity(i){
 localStorage.identity=JSON.stringify(i);
}

function initIdentity(){

 let id=getIdentity();

 if(!id.name){
  id.name=prompt("Your name?");
  id.values=prompt("Your values?");
  id.streak=0;
  id.checkins=[];
  setIdentity(id);
 }

 return id;
}

let ID=initIdentity();

// ---------- DASHBOARD ----------
function updateDashboard(){

 document.getElementById("name").innerText=ID.name;
 document.getElementById("identity").innerText="Values: "+ID.values;
 document.getElementById("streak").innerText="Streak: "+ID.streak;

 let log=getLog();

 if(log.length>3){
  document.getElementById("insight").innerText="You’ve been active recently.";
 }
}

// ---------- STATE ----------
function enterState(s){

 let log=getLog();
 log.push({t:Date.now(),s});
 localStorage.log=JSON.stringify(log);

 document.getElementById("mode").innerText=s;

 coach(s);
 drawChart();
}

// ---------- COACH ----------
function coach(s){

 let messages={
  RED:"Pause. You are safe.",
  BLUE:"Go slow. One step.",
  PURPLE:"You are overthinking.",
  YELLOW:"Too much. Simplify.",
  GREEN:"You are clear. Move."
 };

 let msg=messages[s];
 document.getElementById("main").innerText=msg;
 speak(msg);
}

// ---------- BRAIN DUMP ----------
function processDump(){

 let text=document.getElementById("dump").value;

 let result="Focus on one thing.\nIgnore the rest.";

 if(text.includes("angry")){
  result="You are emotional. Do not react yet.";
 }

 document.getElementById("result").innerText=result;
 speak(result);
}

// ---------- CHECK IN ----------
function dailyCheck(){

 let id=getIdentity();

 id.checkins.push(new Date().toDateString());
 id.streak++;

 setIdentity(id);

 speak("Check in complete");
 updateDashboard();
}

// ---------- GRAPH ----------
function drawChart(){

 let c=document.getElementById("chart");
 let ctx=c.getContext("2d");

 ctx.clearRect(0,0,c.width,c.height);

 let log=getLog().slice(-7);

 let map={RED:1,BLUE:2,YELLOW:3,PURPLE:4,GREEN:5};

 log.forEach((e,i)=>{
  let x=i*40+20;
  let y=150-(map[e.s]*20);

  ctx.fillRect(x,y,20,150-y);
 });
}

// ---------- INIT ----------
updateDashboard();
drawChart();

</script>

</body>
</html>
