<!DOCTYPE html>
<html>
<head>
  <title>Return</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <style>
  body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: radial-gradient(circle at top, #1a1d24, #0f1115);
  color: #e8e6e3;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

#app {
  max-width: 320px;
  width: 100%;
}

h2 {
  font-weight: 500;
  margin-bottom: 20px;
  opacity: 0.8;
}

.btn {
  display: block;
  margin: 12px auto;
  padding: 16px;
  border-radius: 20px;
  color: white;
  border: none;
  width: 100%;
  font-size: 17px;
  transition: transform 0.15s ease, opacity 0.2s;
}

.btn:active {
  transform: scale(0.96);
  opacity: 0.8;
}
  </style>
</head>
<body>
<div id="app">
  <div id="home">
    <h2>be still</h2>
    <button class="btn y" onclick="show('static')">🟡 static</button>
    <button class="btn r" onclick="show('heat')">🔴 heat</button>
    <button class="btn o" onclick="show('threat')">🟠 threat</button>
    <button class="btn p" onclick="show('pressure')">🟣 pressure</button>
    <button class="btn b" onclick="show('gravity')">🔵 gravity</button>
  </div>

  <div id="state" style="display:none;">
    <p id="text"></p>
    <button onclick="next()">continue</button>
  </div>

  <div id="next" style="display:none;">
    <p>just begin<br>one small step<br>God meets you here</p>
    <button onclick="home()">done</button>
  </div>
</div>

<script>
function show(state) {
  document.getElementById("home").style.display = "none";
  document.getElementById("state").style.display = "block";

  let text = "";

  if (state === "heat") {
    text = `
you feel overwhelmed

pause

breathe in slowly  
hold  
release  

you are not in danger  

God is near to you
`;
  }

  if (state === "threat") {
    text = `
something feels wrong

look around

you are safe enough

come back to the present
`;
  }

  if (state === "pressure") {
    text = `
too much at once

you don’t need to solve everything

just the next 5 minutes
`;
  }

  if (state === "gravity") {
    text = `
you feel heavy

that’s okay

rest or move gently
`;
  }

  if (state === "static") {
    text = `
too much input

slow down

choose one thing
`;
  }

  document.getElementById("text").innerText = text;
}

function next() {
  document.getElementById("state").style.display = "none";
  document.getElementById("next").style.display = "block";
}

function home() {
  document.getElementById("next").style.display = "none";
  document.getElementById("home").style.display = "block";
}
</script>

</body>
</html>
