<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:-apple-system;
 color:#e8e6e3;
 text-align:center;
 transition:0.5s;
}

body.yellow{background:linear-gradient(#3a3a1a,#1f1f0f);}
body.red{background:linear-gradient(#3a1a1a,#1a0f0f);}
body.orange{background:linear-gradient(#3a261a,#1f140f);}
body.purple{background:linear-gradient(#2a1a3a,#140f1f);}
body.blue{background:linear-gradient(#1a253a,#0f1624);}

#app{max-width:420px;margin:auto;padding:20px;}

.btn{
 margin:8px 0;
 padding:14px;
 border-radius:999px;
 background:rgba(255,255,255,0.08);
}

input, textarea{
 width:90%;
 padding:10px;
 margin:5px 0;
 border-radius:10px;
 border:none;
}

#timer{
 font-size:28px;
 margin-top:10px;
}

.tabbar{
 position:fixed;
 bottom:0;
 width:100%;
 max-width:420px;
 display:flex;
 justify-content:space-around;
 background:#111;
 padding:10px 0;
}
</style>
</head>

<body class="yellow">

<div id="app">

<!-- HOME -->
<div id="home">
<h2>return</h2>
<div class="btn" onclick="nav('checkin')">check in</div>
<div class="btn" onclick="nav('clarity')">clarity</div>
<div class="btn" onclick="nav('dump')">brain dump</div>
<div id="homeInsight"></div>
</div>

<!-- CLARITY -->
<div id="clarity" style="display:none;">
<h2>clarity</h2>
<input id="fox" placeholder="your focus">

<div class="btn" onclick="pickState('yellow')">🟡</div>
<div class="btn" onclick="pickState('red')">🔴</div>
<div class="btn" onclick="pickState('orange')">🟠</div>
<div class="btn" onclick="pickState('purple')">🟣</div>
<div class="btn" onclick="pickState('blue')">🔵</div>

<div class="btn" onclick="runDay()">start</div>

<div id="clarityText"></div>

<div id="stepMode" style="display:none;">
<h3 id="stepText"></h3>
<div id="timer"></div>
<div class="btn" onclick="nextStep()">next</div>
</div>

<div class="btn" onclick="completeTask()">i did it</div>
</div>

<!-- DUMP -->
<div id="dump" style="display:none;">
<h2>brain dump</h2>
<textarea id="dumpInput"></textarea>
<div class="btn" onclick="processDump()">clarify</div>
<div id="dumpOutput"></div>
</div>

</div>

<div class="tabbar">
<div class="tab" onclick="nav('home')">home</div>
<div class="tab" onclick="nav('clarity')">clarity</div>
<div class="tab" onclick="nav('dump')">dump</div>
</div>

<script>

// NAV
function nav(id){
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById(id).style.display="block";
 if(id==="home") updateHome();
}

// STATE
let currentState=null;
function pickState(s){
 currentState=s;
 document.body.className=s;
}

// SCRIPTURE
const scriptures={
 red:["be still","god is with you"],
 purple:["trust","renew your mind"],
 blue:["rest","strength returns"],
 yellow:["quiet","be still"],
 orange:["you are safe"]
};

function getScripture(s){
 let list=scriptures[s]||["steady"];
 return list[Math.floor(Math.random()*list.length)];
}

// COACH
function getCoach(s){
 let map={
  red:"stop pushing",
  purple:"stop thinking",
  blue:"rest first",
  yellow:"reduce input",
  orange:"you are safe"
 };
 return map[s]||"steady";
}

// 🪜 STEP MODE
let steps=[];
let stepIndex=0;

function runDay(){

 let fox=document.getElementById("fox").value||"task";

 let coach=getCoach(currentState);
 let scripture=getScripture(currentState);

 // build steps
 if(currentState==="red"){
  steps=["stop","breathe","wait","open "+fox,"2 min work"];
 } else if(currentState==="purple"){
  steps=["write it down","pick one","open "+fox,"2 min"];
 } else{
  steps=["open "+fox,"2 min"];
 }

 clarityText.innerText=coach+"\n\n"+scripture;

 // start step mode
 stepIndex=0;
 document.getElementById("stepMode").style.display="block";
 showStep();

 saveTask(fox);
 logUsage();
}

// SHOW STEP
function showStep(){
 document.getElementById("stepText").innerText=steps[stepIndex];

 if(steps[stepIndex].includes("2 min")){
  startTimer(120);
 } else {
  document.getElementById("timer").innerText="";
 }
}

// NEXT STEP
function nextStep(){
 stepIndex++;
 if(stepIndex<steps.length){
  showStep();
 } else{
  document.getElementById("stepText").innerText="done";
 }
}

// ⏱️ TIMER
let timerInterval;

function startTimer(seconds){

 clearInterval(timerInterval);

 let t=seconds;

 timerInterval=setInterval(()=>{
  let m=Math.floor(t/60);
  let s=t%60;

  document.getElementById("timer").innerText=
   m+":"+(s<10?"0":"")+s;

  t--;

  if(t<0){
   clearInterval(timerInterval);
   document.getElementById("timer").innerText="complete";
  }

 },1000);
}

// DUMP
function processDump(){

 let text=document.getElementById("dumpInput").value;

 let lines=text.split(/[\n,.]/).filter(l=>l);

 let top=lines[0]||"start small";

 dumpOutput.innerText="focus:\n"+top;

 saveTask(top);
 logUsage();
}

// TASKS
function saveTask(task){
 let t=JSON.parse(localStorage.getItem("tasks")||"[]");
 t.push({task,completed:false});
 localStorage.setItem("tasks",JSON.stringify(t));
}

function completeTask(){
 let t=JSON.parse(localStorage.getItem("tasks")||"[]");
 if(t.length) t[t.length-1].completed=true;
 localStorage.setItem("tasks",JSON.stringify(t));
}

// STREAK
function logUsage(){
 let today=new Date().toDateString();
 let u=JSON.parse(localStorage.getItem("usage")||"[]");
 if(u[u.length-1]!==today) u.push(today);
 localStorage.setItem("usage",JSON.stringify(u));
}

function getStreak(){
 let u=JSON.parse(localStorage.getItem("usage")||"[]");
 return u.length;
}

// HOME
function updateHome(){
 homeInsight.innerText="🔥 streak: "+getStreak();
}

</script>

</body>
</html>
