<script>
let steps=[], i=0, timer, currentType='';

const baseProtocols={
    red: ["Splash ice water on face", "Drink 8oz Water", "Clear visual field"],
    blue: ["Check weighted blanket", "Dim the lights", "10-second posture reset"]
};

const anchors = {
    red: "Be still. Logic is offline. Move the body.",
    blue: "Rest is a designated task. Gravity is high."
};

function predictAdjustments(){
    let data=JSON.parse(localStorage.sessions||"[]");
    let recent=data.slice(-10);
    let failRate=recent.filter(s=>!s.completed).length/(recent.length||1);
    let hour=new Date().getHours();
    
    let adj=[];
    if(failRate > 0.5) adj.push("AUTO-REDUCE: Minimum Viable Shift Active");
    if(hour > 22 || hour < 6) adj.push("NIGHT MODE: Focus on Reset only");
    return adj;
}

function startHunt(type){
    currentType = type;
    let fox = document.getElementById('foxInput').value || "Execution";
    
    // THE UNZIPPER INTERCEPT
    let unzip = prompt("UNZIPPER: List 3 physical movements for '" + fox + "':", "Step 1, Step 2, Step 3");
    let physicalSteps = unzip ? unzip.split(',').map(s => s.trim()) : ["Engage first movement"];

    let adjustments = predictAdjustments();
    
    // BUILD FINAL SEQUENCE
    steps = [...adjustments, ...baseProtocols[type], ...physicalSteps, "2 min: " + fox];
    
    i=0;
    document.getElementById('shroud').style.display='flex';
    document.getElementById('anchor').innerText = anchors[type];
    runStep();
    logStart(type);
}

function runStep(){
    document.getElementById('step').innerText=steps[i];
    // Timer triggers for the final sprint
    if(steps[i].includes('2 min')) startTimer(120);
    else document.getElementById('timer').innerText = "--:--";
}

function nextStep(){
    i++;
    if(i<steps.length) runStep();
    else endSession(true);
}

function startTimer(s){
    clearInterval(timer);
    let t=s;
    timer=setInterval(()=>{
        let m=Math.floor(t/60), sec=t%60;
        document.getElementById('timer').innerText = `${m}:${sec<10?'0':''}${sec}`;
        if(t--<=0){
            clearInterval(timer);
            if(navigator.vibrate) navigator.vibrate([300, 100, 300]); // Haptic nudge
            document.getElementById('timer').innerText = "DONE";
        }
    },1000);
}

function endSession(success){
    document.getElementById('shroud').style.display='none';
    clearInterval(timer);
    if(success) updateStreak();
    logEnd(success);
    updateUI();
}

function logStart(type){
    let d=JSON.parse(localStorage.sessions||"[]");
    d.push({t:Date.now(), type, completed:false});
    localStorage.sessions=JSON.stringify(d);
}

function logEnd(success){
    let d=JSON.parse(localStorage.sessions||"[]");
    if(d.length) d[d.length-1].completed=success;
    localStorage.sessions=JSON.stringify(d);
}

function updateStreak(){
    let today=new Date().toDateString();
    if(localStorage.last!=today){
        localStorage.streak=(+localStorage.streak||0)+1;
        localStorage.last=today;
    }
}

function getLevel(){
    let s=+localStorage.streak||0;
    if(s>30) return "ARCHITECT PRIME";
    if(s>14) return "ARCHITECT II";
    if(s>7) return "ARCHITECT I";
    return "INITIATE";
}

function updateUI(){
    document.getElementById('streak').innerText="STREAK: "+(localStorage.streak||0)+" DAYS";
    document.getElementById('level').innerText=getLevel();
    
    let d=JSON.parse(localStorage.sessions||"[]");
    if(d.length > 3){
        let fails = d.filter(s=>!s.completed).length;
        let rate = Math.round((fails/d.length)*100);
        document.getElementById('insight').innerText = rate > 40 ? "ANALYSIS: HIGH FRICTION — SIMPLIFY NEXT" : "ANALYSIS: STABLE FLOW";
    }
}

function sendSafetySignal(){
    window.location.href = `sms:?&body=${encodeURIComponent("Architect Protocol: I am at Level 0. Going offline to recover. I am safe.")}`;
}

// THE BACKGROUND STARS
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
let particles = Array.from({length:80},()=>({
    x:Math.random()*canvas.width, 
    y:Math.random()*canvas.height, 
    v:Math.random()*0.4 + 0.1
}));

function animate(){
    ctx.fillStyle = '#020617';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#ffffff33';
    particles.forEach(p=>{
        p.y += p.v;
        if(p.y > canvas.height) p.y = 0;
        ctx.fillRect(p.x, p.y, 1, 1);
    });
    requestAnimationFrame(animate);
}
animate();

updateUI();
</script>
