<!DOCTYPE html>
<html>
<head>
  <title>Return</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: radial-gradient(circle at top, #14161b, #0c0d10);
      color: #e8e6e3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    #app { max-width: 350px; width: 100%; }

    h2 { opacity: 0.8; }

    .btn {
      margin: 10px;
      padding: 14px;
      border-radius: 16px;
      border: none;
      width: 90%;
      color: white;
      font-size: 16px;
    }

    .y { background:#bfa76f }
    .r { background:#b85c5c }
    .o { background:#c98a4b }
    .p { background:#8b6fa8 }
    .b { background:#5f7c99 }

    .breath {
      width:120px;height:120px;
      margin:20px auto;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      animation:breathe 6s infinite;
    }

    @keyframes breathe {
      0%{transform:scale(.8)}
      50%{transform:scale(1.2)}
      100%{transform:scale(.8)}
    }

    textarea {
      width:90%;
      height:80px;
      border-radius:10px;
      border:none;
      padding:10px;
    }

    .small {
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:10px;
      background:rgba(255,255,255,0.1);
      color:white;
    }
  </style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home">
  <h2>be still</h2>
  <button class="btn r" onclick="start('heat')">overwhelmed</button>
  <button class="btn o" onclick="start('threat')">anxious</button>
  <button class="btn p" onclick="start('pressure')">pressure</button>
  <button class="btn b" onclick="start('gravity')">low</button>
  <button class="btn y" onclick="start('static')">scattered</button>
  <button class="small" onclick="insights()">view patterns</button>
</div>

<!-- SMART QUESTION -->
<div id="question" style="display:none;">
  <p id="qtext"></p>
  <button class="small" onclick="answer(1)">yes</button>
  <button class="small" onclick="answer(0)">no</button>
</div>

<!-- STATE -->
<div id="state" style="display:none;">
  <div class="breath"></div>
  <p id="text"></p>
  <button class="small" onclick="next()">continue</button>
</div>

<!-- JOURNAL -->
<div id="journal" style="display:none;">
  <p>what is weighing on you?</p>
  <textarea id="entry"></textarea>
  <button class="small" onclick="save()">save</button>
</div>

<!-- INSIGHTS -->
<div id="insight" style="display:none;">
  <h3>your patterns</h3>
  <div id="stats"></div>
  <button class="small" onclick="home()">back</button>
</div>

<!-- END -->
<div id="end" style="display:none;">
  <p>you are not alone in this<br>God is with you</p>
  <button class="small" onclick="home()">done</button>
</div>

</div>

<script>

let state="",steps=[],i=0,depth=0;

// voice
function speak(t){
 let m=new SpeechSynthesisUtterance(t);
 m.rate=0.85;
 speechSynthesis.cancel();
 speechSynthesis.speak(m);
}

// start
function start(s){
 state=s;
 document.getElementById("home").style.display="none";
 ask();
}

// smart question
function ask(){
 document.getElementById("question").style.display="block";

 let q="does this feel intense?";
 if(state==="gravity") q="do you feel stuck or drained?";

 document.getElementById("qtext").innerText=q;
}

// answer
function answer(a){
 depth=a;
 document.getElementById("question").style.display="none";
 document.getElementById("state").style.display="block";

 build();
 i=0;
 show();
}

// build adaptive steps
function build(){

 if(state==="heat"){
   steps = depth ? [
    "this is overwhelming",
    "pause everything",
    "breathe slowly",
    "God is your refuge",
    "you are held even here"
   ] : [
    "you feel stress rising",
    "slow down",
    "you are okay",
    "stay present"
   ];
 }

 if(state==="threat"){
   steps=[
    "you feel unsafe",
    "look around slowly",
    "your body is reacting",
    "God is your protector",
    "return to now"
   ];
 }

 if(state==="pressure"){
   steps=[
    "too much responsibility",
    "you are not meant to carry all of this",
    "God carries what you cannot",
    "do one small thing"
   ];
 }

 if(state==="gravity"){
   steps=[
    "you feel heavy",
    "that is not failure",
    "even here God is near",
    "rest is allowed"
   ];
 }

 if(state==="static"){
   steps=[
    "your mind is scattered",
    "slow everything down",
    "you don’t need to hold it all",
    "God brings clarity"
   ];
 }
}

// show
function show(){
 let t=steps[i];
 document.getElementById("text").innerText=t;
 speak(t);
}

// next
function next(){
 i++;
 if(i<steps.length){
  show();
 } else {
  document.getElementById("state").style.display="none";
  document.getElementById("journal").style.display="block";
 }
}

// save journal + track
function save(){
 let txt=document.getElementById("entry").value;
 let data=JSON.parse(localStorage.getItem("data")||"[]");

 data.push({state:state, date:new Date().toLocaleDateString()});
 localStorage.setItem("data",JSON.stringify(data));

 document.getElementById("journal").style.display="none";
 document.getElementById("end").style.display="block";
}

// insights
function insights(){
 document.getElementById("home").style.display="none";
 document.getElementById("insight").style.display="block";

 let data=JSON.parse(localStorage.getItem("data")||"[]");
 let count={};

 data.forEach(d=>{
  count[d.state]=(count[d.state]||0)+1;
 });

 let out="";
 for(let k in count){
  out += k + ": " + count[k] + "<br>";
 }

 document.getElementById("stats").innerHTML = out || "no data yet";
}

// home
function home(){
 location.reload();
}

</script>

</body>
</html>
