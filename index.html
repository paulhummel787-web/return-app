<!DOCTYPE html>
<html>
<head>
  <title>Return</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: radial-gradient(circle at center, #1c1f26 0%, #0b0d11 80%);
      color: #e8e6e3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    #app {
      width: 100%;
      max-width: 320px;
    }

    h2 {
      font-weight: 400;
      opacity: 0.6;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .choice {
      margin: 14px 0;
      padding: 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      font-size: 16px;
    }

    .breath {
      width: 160px;
      height: 160px;
      margin: 40px auto;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
      animation: breathe 7s ease-in-out infinite;
    }

    @keyframes breathe {
      0% { transform: scale(0.85); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.85); opacity: 0.4; }
    }

    #text {
      font-size: 20px;
      line-height: 1.6;
      min-height: 120px;
      padding: 0 20px;
    }

    #scripture {
      font-size: 14px;
      opacity: 0.5;
      margin-top: 10px;
    }

    .small {
      margin-top: 30px;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.06);
      color: white;
    }
  </style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home">
  <h2>be still</h2>

  <div class="choice" onclick="start('heat')">overwhelmed</div>
  <div class="choice" onclick="start('threat')">anxious</div>
  <div class="choice" onclick="start('pressure')">pressure</div>
  <div class="choice" onclick="start('gravity')">low</div>
  <div class="choice" onclick="start('static')">scattered</div>
</div>

<!-- STATE -->
<div id="state" style="display:none;">
  <div class="breath"></div>
  <div id="text"></div>
  <div id="scripture"></div>
  <button class="small" onclick="next()">continue</button>
</div>

<!-- END -->
<div id="end" style="display:none;">
  <p>stay here a moment</p>
  <button class="small" onclick="home()">return</button>
</div>

</div>

<script>

let state="", steps=[], i=0;

// voice
function speak(t){
 let m=new SpeechSynthesisUtterance(t);
 m.rate=0.8;
 speechSynthesis.cancel();
 speechSynthesis.speak(m);
}

// start
function start(s){
 state=s;
 document.getElementById("home").style.display="none";
 document.getElementById("state").style.display="block";
 build();
 i=0;
 show();
}

// steps (simpler, deeper tone)
function build(){

 if(state==="heat"){
  steps=[
   "this is a lot",
   "slow your breathing",
   "you are not in danger",
   "God is your refuge",
   "stay here"
  ];
 }

 if(state==="threat"){
  steps=[
   "something feels wrong",
   "look around slowly",
   "you are safe enough",
   "God is your protector",
   "return to now"
  ];
 }

 if(state==="pressure"){
  steps=[
   "too much at once",
   "you don’t need to carry it all",
   "just one step",
   "God is not rushing you",
   "begin small"
  ];
 }

 if(state==="gravity"){
  steps=[
   "you feel heavy",
   "that’s okay",
   "rest here",
   "God is near",
   "you are not alone"
  ];
 }

 if(state==="static"){
  steps=[
   "too much noise",
   "slow everything down",
   "focus on one thing",
   "God brings clarity",
   "be still"
  ];
 }

}

// scripture
function getScripture(){
 const v=[
  "Be still and know that I am God",
  "The Lord is my shepherd",
  "Come to me and I will give you rest",
  "God is our refuge and strength"
 ];
 return v[Math.floor(Math.random()*v.length)];
}

// show
function show(){
 let t=steps[i];
 document.getElementById("text").innerText=t;
 document.getElementById("scripture").innerText=getScripture();
 speak(t);
}

// next
function next(){
 i++;
 if(i<steps.length){
  show();
 } else {
  document.getElementById("state").style.display="none";
  document.getElementById("end").style.display="block";
 }
}

// home
function home(){
 location.reload();
}

</script>

</body>
</html>
