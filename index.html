<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 overflow:hidden;
 font-family:-apple-system;
 color:#e8e6e3;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 background:#050505;
}

/* 🌌 BACKGROUND GLOW */
#glow{
 position:fixed;
 width:200%;
 height:200%;
 top:-50%;
 left:-50%;
 background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
 animation: drift 25s infinite linear;
}

/* 🌫 FOG */
#fog{
 position:fixed;
 width:200%;
 height:200%;
 top:-50%;
 left:-50%;
 background: radial-gradient(circle, rgba(255,255,255,0.03), transparent 70%);
 animation: drift2 40s infinite linear;
}

@keyframes drift{
 0%{transform:translate(0,0);}
 50%{transform:translate(40px,40px);}
 100%{transform:translate(0,0);}
}

@keyframes drift2{
 0%{transform:translate(0,0);}
 50%{transform:translate(-30px,20px);}
 100%{transform:translate(0,0);}
}

/* ✨ PARTICLES */
.particle{
 position:fixed;
 width:3px;
 height:3px;
 background:white;
 border-radius:50%;
 opacity:.2;
 animation: float linear infinite;
}

@keyframes float{
 from{transform:translateY(100vh);}
 to{transform:translateY(-10vh);}
}

/* APP */
#app{
 position:relative;
 z-index:2;
 max-width:360px;
 width:100%;
 text-align:center;
}

.choice{
 margin:10px 0;
 padding:14px;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
}

.active{background:rgba(255,255,255,0.2);}

/* 🌬 BREATH FIELD */
.breath{
 width:160px;height:160px;margin:20px auto;border-radius:50%;
 background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
 animation:breathe 8s infinite ease-in-out;
}

@keyframes breathe{
 0%{transform:scale(.8);}
 50%{transform:scale(1.3);}
 100%{transform:scale(.8);}
}

.small{
 margin-top:10px;
 padding:10px;
 border:none;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
 color:white;
}
</style>
</head>

<body>

<div id="glow"></div>
<div id="fog"></div>

<div id="app">

<!-- HOME -->
<div id="home">
<h2>return</h2>
<div class="choice" onclick="nav('select')">begin</div>
<div class="choice" onclick="nav('chat')">talk</div>
<div class="choice" onclick="insight()">insight</div>
</div>

<!-- SELECT -->
<div id="select" style="display:none;">
<h2>what are you feeling</h2>

<div class="choice" onclick="toggle('heat',this)">overwhelmed</div>
<div class="choice" onclick="toggle('threat',this)">anxious</div>
<div class="choice" onclick="toggle('pressure',this)">pressure</div>
<div class="choice" onclick="toggle('gravity',this)">low</div>
<div class="choice" onclick="toggle('static',this)">scattered</div>

<button class="small" onclick="start()">enter</button>
</div>

<!-- FLOW -->
<div id="flow" style="display:none;">
<div class="breath"></div>
<div id="text"></div>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">
<h2>talk</h2>
<div id="chatBox"></div>
<input id="input">
<button class="small" onclick="send()">send</button>
<button class="small" onclick="nav('home')">back</button>
</div>

<!-- INSIGHT -->
<div id="insight" style="display:none;">
<h2>pattern</h2>
<div id="insightText"></div>
<button class="small" onclick="nav('home')">back</button>
</div>

</div>

<script>

let selected=[],steps=[],i=0,interval;

// 🌌 CREATE PARTICLES
for(let i=0;i<40;i++){
 let p=document.createElement("div");
 p.className="particle";
 p.style.left=Math.random()*100+"vw";
 p.style.animationDuration=(10+Math.random()*20)+"s";
 document.body.appendChild(p);
}

// NAV
function nav(id){
 clearInterval(interval);
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById(id).style.display="block";
}

// SELECT
function toggle(s,el){
 if(selected.includes(s)){
  selected=selected.filter(x=>x!==s);
  el.classList.remove("active");
 } else {
  selected.push(s);
  el.classList.add("active");
 }
}

// 🌈 MOOD COLORS
function setMood(){
 let glow=document.getElementById("glow");

 if(selected.includes("heat"))
  glow.style.background="radial-gradient(circle,#ff6a3d22,transparent 60%)";

 if(selected.includes("threat"))
  glow.style.background="radial-gradient(circle,#6a7dff22,transparent 60%)";

 if(selected.includes("gravity"))
  glow.style.background="radial-gradient(circle,#111,transparent 60%)";
}

// START
function start(){
 setMood();
 nav("flow");
 build();
 i=0;
 runFlow();
}

// FLOW
function build(){
 steps=[
  "pause",
  "breathe slowly",
  "you are safe",
  "stay here"
 ];
}

function runFlow(){
 show();
 interval=setInterval(()=>{
  i++;
  if(i<steps.length) show();
  else nav("home");
 },4000);
}

function show(){
 document.getElementById("text").innerText=steps[i];
 speak(steps[i]);
}

// VOICE
function speak(t){
 let m=new SpeechSynthesisUtterance(t);
 m.rate=0.8;
 speechSynthesis.cancel();
 speechSynthesis.speak(m);
}

// CHAT
function send(){
 let input=document.getElementById("input").value;
 let box=document.getElementById("chatBox");

 box.innerHTML+="<div>"+input+"</div><div style='opacity:.6'>i hear you. slow down. you're okay.</div>";
 document.getElementById("input").value="";
}

// INSIGHT
function insight(){
 nav("insight");
 document.getElementById("insightText").innerText="patterns forming...";
}

</script>

</body>
</html>
