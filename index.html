<!DOCTYPE html>
<html>
<head>
  <title>Return</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #e8e6e3;
      transition: background 2s ease;
    }

    /* THEMES */
    .morning {
      background: radial-gradient(circle at center, #2a2f3a, #0e1015);
    }

    .day {
      background: radial-gradient(circle at center, #1c1f26, #0b0d11);
    }

    .night {
      background: radial-gradient(circle at center, #0a0c10, #000000);
    }

    #app {
      width: 100%;
      max-width: 320px;
    }

    h2 {
      font-weight: 400;
      opacity: 0.5;
      letter-spacing: 3px;
      margin-bottom: 50px;
    }

    .choice {
      margin: 14px 0;
      padding: 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 15px;
    }

    .breath {
      width: 180px;
      height: 180px;
      margin: 40px auto;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.12), rgba(255,255,255,0.01));
      animation: breathe 8s ease-in-out infinite;
      box-shadow: 0 0 60px rgba(255,255,255,0.05);
    }

    @keyframes breathe {
      0% { transform: scale(0.85); opacity: 0.3; }
      50% { transform: scale(1.25); opacity: 1; }
      100% { transform: scale(0.85); opacity: 0.3; }
    }

    #text {
      font-size: 20px;
      line-height: 1.7;
      min-height: 120px;
      padding: 0 20px;
      opacity: 0.9;
    }

    #scripture {
      font-size: 13px;
      opacity: 0.4;
      margin-top: 10px;
    }

    .small {
      margin-top: 40px;
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.05);
      color: white;
    }

  </style>
</head>

<body id="body">

<div id="app">

<!-- HOME -->
<div id="home">
  <h2>be still</h2>

  <div class="choice" onclick="start('heat')">overwhelmed</div>
  <div class="choice" onclick="start('threat')">anxious</div>
  <div class="choice" onclick="start('pressure')">pressure</div>
  <div class="choice" onclick="start('gravity')">low</div>
  <div class="choice" onclick="start('static')">scattered</div>
</div>

<!-- STATE -->
<div id="state" style="display:none;">
  <div class="breath"></div>
  <div id="text"></div>
  <div id="scripture"></div>
  <button class="small" onclick="next()">continue</button>
</div>

<!-- END -->
<div id="end" style="display:none;">
  <p>remain here a moment</p>
  <button class="small" onclick="home()">return</button>
</div>

</div>

<script>

// 🌅 TIME THEMES
function setTheme(){
  let h = new Date().getHours();
  let b = document.getElementById("body");

  if(h < 10) b.className = "morning";
  else if(h < 18) b.className = "day";
  else b.className = "night";
}
setTheme();

// 🎧 voice
function speak(t){
 let m=new SpeechSynthesisUtterance(t);
 m.rate=0.75;
 speechSynthesis.cancel();
 speechSynthesis.speak(m);
}

let state="",steps=[],i=0;

// 🚀 start
function start(s){
 state=s;
 document.getElementById("home").style.display="none";
 document.getElementById("state").style.display="block";
 build();
 i=0;
 show();
}

// 🧠 clarity + spiritual blend
function build(){

 if(state==="heat"){
  steps=[
   "this is your system overwhelmed",
   "your body is trying to protect you",
   "you are not in danger",
   "slow your breath",
   "God is your refuge",
   "stay here"
  ];
 }

 if(state==="threat"){
  steps=[
   "your mind is sensing danger",
   "this does not mean danger is real",
   "look around slowly",
   "orient to the present",
   "God is your protector"
  ];
 }

 if(state==="pressure"){
  steps=[
   "this is too much at once",
   "you are not meant to carry all of this",
   "reduce it to one step",
   "God is not rushing you",
   "begin small"
  ];
 }

 if(state==="gravity"){
  steps=[
   "this is heaviness",
   "your system is slowing down",
   "this is not failure",
   "rest here",
   "God is near"
  ];
 }

 if(state==="static"){
  steps=[
   "this is overstimulation",
   "too much input",
   "slow everything down",
   "focus on one thing",
   "God brings clarity"
  ];
 }

}

// 📖 scripture rotation
function getScripture(){
 const v=[
  "Be still and know that I am God",
  "The Lord is close to the brokenhearted",
  "Cast your cares on Him",
  "Come to me and I will give you rest",
  "God is our refuge and strength"
 ];
 return v[Math.floor(Math.random()*v.length)];
}

// 👁 show
function show(){
 let t=steps[i];
 document.getElementById("text").innerText=t;
 document.getElementById("scripture").innerText=getScripture();
 speak(t);
}

// ➡️ next
function next(){
 i++;
 if(i<steps.length){
  show();
 } else {
  document.getElementById("state").style.display="none";
  document.getElementById("end").style.display="block";
 }
}

// 🔄 home
function home(){
 location.reload();
}

</script>

</body>
</html>
