<!DOCTYPE html>
<html>
<head>
  <title>Return</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: radial-gradient(circle at top, #1a1d24, #0f1115);
      color: #e8e6e3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    #app {
      max-width: 340px;
      width: 100%;
      padding: 10px;
    }

    h2 {
      font-weight: 500;
      margin-bottom: 25px;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    .btn {
      display: block;
      margin: 12px auto;
      padding: 16px;
      border-radius: 20px;
      color: white;
      border: none;
      width: 100%;
      font-size: 17px;
      transition: transform 0.15s ease, opacity 0.2s;
    }

    .btn:active {
      transform: scale(0.96);
      opacity: 0.8;
    }

    .y { background: #bfa76f; }
    .r { background: #b85c5c; }
    .o { background: #c98a4b; }
    .p { background: #8b6fa8; }
    .b { background: #5f7c99; }

    #text {
      font-size: 20px;
      line-height: 1.6;
      margin: 20px 0;
      min-height: 120px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .show {
      opacity: 1 !important;
    }

    .breath {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      margin: 25px auto;
      background: rgba(255,255,255,0.08);
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0% { transform: scale(0.8); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0.4; }
    }

    button.small {
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }
  </style>
</head>

<body>

<div id="app">

  <div id="home">
    <h2>be still</h2>
    <button class="btn y" onclick="show('static')">🟡 static</button>
    <button class="btn r" onclick="show('heat')">🔴 heat</button>
    <button class="btn o" onclick="show('threat')">🟠 threat</button>
    <button class="btn p" onclick="show('pressure')">🟣 pressure</button>
    <button class="btn b" onclick="show('gravity')">🔵 gravity</button>
  </div>

  <div id="state" style="display:none;">
    <div class="breath"></div>
    <div id="text"></div>
    <button class="small" onclick="next()">continue</button>
  </div>

  <div id="next" style="display:none;">
    <p>just begin<br>one small step<br>God meets you here</p>
    <button class="small" onclick="home()">done</button>
  </div>

</div>

<script>

let steps = [];
let currentStep = 0;

// 🌿 calm voice
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.8;
  msg.pitch = 0.95;
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

// ✨ smooth text fade
function updateText(text) {
  const el = document.getElementById("text");
  el.classList.remove("show");

  setTimeout(() => {
    el.innerText = text;
    el.classList.add("show");
    speak(text);
  }, 200);
}

// 🌊 states (deep + structured)
function show(state) {
  document.getElementById("home").style.display = "none";
  document.getElementById("state").style.display = "block";

  if (state === "heat") {
    steps = [
      "this feels intense",
      "but you are still here",
      "slow your breath",
      "in... hold... out...",
      "you are not in danger",
      "God is near to you",
      "stay here a moment"
    ];
  }

  if (state === "threat") {
    steps = [
      "something feels wrong",
      "look around slowly",
      "name what you can see",
      "feel your body",
      "you are safe enough",
      "come back to the present",
      "you are held"
    ];
  }

  if (state === "pressure") {
    steps = [
      "this is too much at once",
      "you don’t need to solve everything",
      "just this moment",
      "just the next step",
      "God is not rushing you",
      "begin small"
    ];
  }

  if (state === "gravity") {
    steps = [
      "you feel heavy",
      "that’s okay",
      "you don’t have to push",
      "rest here",
      "even here, God is with you",
      "gentle movement is enough"
    ];
  }

  if (state === "static") {
    steps = [
      "too much input",
      "slow everything down",
      "come back to one thing",
      "you don’t need to hold it all",
      "God is steady",
      "focus on what matters now"
    ];
  }

  currentStep = 0;
  updateText(steps[currentStep]);
}

// ➡️ next step
function next() {
  currentStep++;

  if (currentStep < steps.length) {
    updateText(steps[currentStep]);
  } else {
    document.getElementById("state").style.display = "none";
    document.getElementById("next").style.display = "block";
  }
}

// 🔄 back home
function home() {
  document.getElementById("next").style.display = "none";
  document.getElementById("home").style.display = "block";
}

</script>

</body>
</html>
