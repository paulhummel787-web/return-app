<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:-apple-system;
 color:white;
 background:#020617;
 text-align:center;
}

.container{padding:20px;max-width:420px;margin:auto;}

.tab{display:none;}

.active{display:block;}

.btn{
 padding:16px;
 margin:10px 0;
 border-radius:12px;
 background:#1e293b;
}

textarea{
 width:100%;
 height:80px;
 border-radius:10px;
 margin-top:10px;
}

#nav{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 justify-content:space-around;
 background:#020617;
 padding:10px 0;
 border-top:1px solid #333;
}

#nav div{
 font-size:12px;
}

.breath{
 width:120px;height:120px;margin:20px auto;
 border-radius:50%;
 background:rgba(255,255,255,0.1);
 animation:breathe 6s infinite;
}

@keyframes breathe{
 0%{transform:scale(.8);}
 50%{transform:scale(1.2);}
 100%{transform:scale(.8);}
}
</style>
</head>

<body>

<div class="container">

<!-- RESET TAB -->
<div id="reset" class="tab active">
<h2>Reset</h2>
<div id="resetText">Press below if you feel off</div>
<div class="breath"></div>
<div class="btn" onclick="startReset()">I feel off</div>
<div id="nextBtn" class="btn" style="display:none;" onclick="nextStep()">Next</div>
</div>

<!-- CLARITY -->
<div id="clarity" class="tab">
<h2>Clarity</h2>
<textarea id="dump" placeholder="Write everything..."></textarea>
<div class="btn" onclick="processDump()">Process</div>
<div id="result"></div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="tab">
<h2>Dashboard</h2>
<div id="stats"></div>
<canvas id="chart"></canvas>
</div>

<!-- YOU -->
<div id="you" class="tab">
<h2>You</h2>
<div id="identity"></div>
<div class="btn" onclick="dailyCheck()">Daily Check-In</div>
</div>

<!-- GUIDE -->
<div id="guide" class="tab">
<h2>Guide</h2>
<div id="scripture"></div>
</div>

</div>

<!-- NAV -->
<div id="nav">
<div onclick="showTab('reset')">Reset</div>
<div onclick="showTab('clarity')">Clarity</div>
<div onclick="showTab('dash')">Dashboard</div>
<div onclick="showTab('you')">You</div>
<div onclick="showTab('guide')">Guide</div>
</div>

<script>

// ---------- VOICE ----------
function speak(t){
 let msg=new SpeechSynthesisUtterance(t);
 msg.rate=0.9;
 speechSynthesis.cancel();
 speechSynthesis.speak(msg);
}

// ---------- NAV ----------
let locked=false;

function showTab(tab){
 if(locked){
  speak("Stay here. Finish this first.");
  return;
 }
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(tab).classList.add("active");
}

// ---------- RESET SYSTEM ----------
let steps=[],i=0;

function startReset(){

 locked=true;

 steps=[
  "Stop. Stay here.",
  "Breathe slowly",
  "You are safe",
  "Do not react",
  "Let it pass"
 ];

 i=0;
 runStep();
 document.getElementById("nextBtn").style.display="block";
}

function runStep(){
 let s=steps[i];
 document.getElementById("resetText").innerText=s;
 speak(s);
}

function nextStep(){
 i++;
 if(i<steps.length){
  runStep();
 } else{
  locked=false;
  document.getElementById("resetText").innerText="You’re okay.";
  speak("Good job");
 }
}

// ---------- BRAIN DUMP ----------
function processDump(){
 let t=document.getElementById("dump").value;
 let r="Focus on one thing.";

 if(t.includes("angry")){
  r="You are emotional. Do not react yet.";
 }

 document.getElementById("result").innerText=r;
 speak(r);
}

// ---------- IDENTITY ----------
function getID(){
 return JSON.parse(localStorage.id||"{}");
}

function setID(d){
 localStorage.id=JSON.stringify(d);
}

function init(){
 let id=getID();
 if(!id.name){
  id.name=prompt("Your name?");
  id.values=prompt("Your values?");
  id.streak=0;
  setID(id);
 }
 updateYou();
}

function updateYou(){
 let id=getID();
 document.getElementById("identity").innerText=
 id.name+" | "+id.values+" | Streak: "+id.streak;
}

// ---------- CHECKIN ----------
function dailyCheck(){
 let id=getID();
 id.streak++;
 setID(id);
 updateYou();
 speak("Check in done");
}

// ---------- DASHBOARD ----------
function updateDash(){
 let log=JSON.parse(localStorage.log||"[]");
 document.getElementById("stats").innerText="Entries: "+log.length;
 drawChart();
}

// ---------- CHART ----------
function drawChart(){
 let c=document.getElementById("chart");
 let ctx=c.getContext("2d");
 ctx.clearRect(0,0,c.width,c.height);

 let log=JSON.parse(localStorage.log||"[]").slice(-7);

 log.forEach((e,i)=>{
  ctx.fillRect(i*40,150-Math.random()*100,20,100);
 });
}

// ---------- SCRIPTURE ----------
function setScripture(){
 let arr=[
  "Be still and know.",
  "You are not alone.",
  "This will pass."
 ];
 document.getElementById("scripture").innerText=
 arr[Math.floor(Math.random()*arr.length)];
}

// ---------- INIT ----------
init();
updateDash();
setScripture();

</script>

</body>
</html>
