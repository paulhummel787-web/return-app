<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:-apple-system;
 background:#050505;
 color:#e8e6e3;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

#app{max-width:360px;width:100%;text-align:center;}

.choice{
 margin:10px 0;
 padding:14px;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
}

.active{background:rgba(255,255,255,0.2);}

.breath{
 width:150px;height:150px;margin:20px auto;border-radius:50%;
 background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
 animation:breathe 8s infinite ease-in-out;
}

@keyframes breathe{
 0%{transform:scale(.8);}
 50%{transform:scale(1.25);}
 100%{transform:scale(.8);}
}

button{
 margin-top:10px;
 padding:10px;
 border:none;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
 color:white;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home">
<h2>return</h2>
<div class="choice" onclick="nav('select')">begin</div>
<div class="choice" onclick="nav('insight')">insight</div>
</div>

<!-- SELECT -->
<div id="select" style="display:none;">
<h2>what are you feeling</h2>

<div class="choice" onclick="toggle('heat',this)">overwhelmed</div>
<div class="choice" onclick="toggle('threat',this)">anxious</div>
<div class="choice" onclick="toggle('pressure',this)">pressure</div>
<div class="choice" onclick="toggle('gravity',this)">low</div>
<div class="choice" onclick="toggle('static',this)">scattered</div>

<button onclick="start()">enter</button>
<button onclick="nav('home')">back</button>
</div>

<!-- FLOW -->
<div id="flow" style="display:none;">
<div class="breath"></div>
<div id="text"></div>
</div>

<!-- INSIGHT -->
<div id="insight" style="display:none;">
<h2>insight</h2>
<div id="insightText"></div>
<button onclick="clearData()">clear data</button>
<button onclick="nav('home')">back</button>
</div>

</div>

<script>

// NAV
function nav(id){
 clearInterval(flowInterval);

 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById(id).style.display="block";

 if(id === "insight"){
  updateInsight();
 }
}

// STATE
let selected=[];

function toggle(state,el){
 if(selected.includes(state)){
  selected=selected.filter(s=>s!==state);
  el.classList.remove("active");
 } else {
  selected.push(state);
  el.classList.add("active");
 }
}

// SAVE DATA
function saveSession(){

 let data = JSON.parse(localStorage.getItem("returnData")) || [];

 data.push({
  states: [...selected],
  time: new Date().toISOString()
 });

 localStorage.setItem("returnData", JSON.stringify(data));
}

// FLOW ENGINE
function buildFlow(){

 let steps=[];

 if(selected.includes("heat"))
  steps.push("this is a lot right now");

 if(selected.includes("threat"))
  steps.push("your mind is trying to protect you");

 if(selected.includes("pressure"))
  steps.push("you are carrying a lot");

 if(selected.includes("gravity"))
  steps.push("your energy is low");

 if(selected.includes("static"))
  steps.push("your attention is scattered");

 steps.push("slow your breathing");
 steps.push("you are safe");
 steps.push("stay here");

 return steps;
}

// FLOW
let flowSteps=[],flowIndex=0,flowInterval;

function start(){

 if(selected.length===0){
  alert("select at least one state");
  return;
 }

 saveSession(); // tracking

 flowSteps=buildFlow();
 flowIndex=0;

 nav("flow");
 runFlow();
}

function runFlow(){
 showStep();

 flowInterval=setInterval(()=>{
  flowIndex++;

  if(flowIndex < flowSteps.length){
   showStep();
  } else {
   nav("home");
   selected=[];
  }

 },4000);
}

function showStep(){
 document.getElementById("text").innerText=flowSteps[flowIndex];
}

// INSIGHT ENGINE
function updateInsight(){

 let data = JSON.parse(localStorage.getItem("returnData")) || [];

 if(data.length === 0){
  document.getElementById("insightText").innerText =
  "no data yet — use the app to build insight";
  return;
 }

 let counts = {
  heat:0,
  threat:0,
  pressure:0,
  gravity:0,
  static:0
 };

 data.forEach(entry=>{
  entry.states.forEach(s=>{
   counts[s]++;
  });
 });

 let top = Object.keys(counts).reduce((a,b)=> counts[a]>counts[b]?a:b);

 document.getElementById("insightText").innerText =
  "most frequent state: " + top;
}

// CLEAR DATA (for testing)
function clearData(){
 localStorage.removeItem("returnData");
 updateInsight();
}

</script>

</body>
</html>
