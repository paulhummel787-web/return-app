<!DOCTYPE html>
<html>
<head>
  <title>Return</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #e8e6e3;
      transition: background 2s ease;
    }

    .morning { background: radial-gradient(circle, #2a2f3a, #0e1015); }
    .day { background: radial-gradient(circle, #1c1f26, #0b0d11); }
    .night { background: radial-gradient(circle, #0a0c10, #000); }

    #app { max-width: 340px; width: 100%; }

    h2 { opacity: 0.5; letter-spacing: 3px; margin-bottom: 30px; }

    .choice {
      margin: 10px 0;
      padding: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
    }

    .breath {
      width: 170px;
      height: 170px;
      margin: 30px auto;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.12), transparent);
      animation: breathe 8s infinite ease-in-out;
    }

    @keyframes breathe {
      0% { transform: scale(0.8); }
      50% { transform: scale(1.2); }
      100% { transform: scale(0.8); }
    }

    #text { font-size: 18px; padding: 0 20px; line-height: 1.6; }
    #info { font-size: 14px; opacity: 0.7; margin-top: 15px; }

    .small {
      margin-top: 20px;
      padding: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: white;
    }
  </style>
</head>

<body id="body">

<div id="app">

<!-- HOME -->
<div id="home">
  <h2>return</h2>

  <div class="choice" onclick="startMode('return')">return (calm)</div>
  <div class="choice" onclick="startMode('learn')">understand</div>
</div>

<!-- STATE SELECT -->
<div id="select" style="display:none;">
  <h2>what are you feeling</h2>

  <div class="choice" onclick="start('heat')">overwhelmed</div>
  <div class="choice" onclick="start('threat')">anxious</div>
  <div class="choice" onclick="start('pressure')">pressure</div>
  <div class="choice" onclick="start('gravity')">low</div>
  <div class="choice" onclick="start('static')">scattered</div>
</div>

<!-- RETURN MODE -->
<div id="state" style="display:none;">
  <div class="breath"></div>
  <div id="text"></div>
  <button class="small" onclick="next()">continue</button>
</div>

<!-- LEARN MODE -->
<div id="learn" style="display:none;">
  <div id="text"></div>
  <div id="info"></div>
  <button class="small" onclick="home()">back</button>
</div>

</div>

<script>

let mode="", state="", steps=[], i=0;

// theme
function setTheme(){
 let h=new Date().getHours();
 let b=document.getElementById("body");
 if(h<10) b.className="morning";
 else if(h<18) b.className="day";
 else b.className="night";
}
setTheme();

// mode select
function startMode(m){
 mode=m;
 document.getElementById("home").style.display="none";
 document.getElementById("select").style.display="block";
}

// start
function start(s){
 state=s;
 document.getElementById("select").style.display="none";

 if(mode==="return"){
  document.getElementById("state").style.display="block";
  buildReturn();
  i=0;
  show();
 } else {
  document.getElementById("learn").style.display="block";
  buildLearn();
 }
}

// RETURN MODE
function buildReturn(){

 if(state==="heat"){
  steps=["this is a lot","slow your breath","you are safe","God is your refuge"];
 }
 if(state==="threat"){
  steps=["something feels wrong","look around","you are safe enough","God is with you"];
 }
 if(state==="pressure"){
  steps=["too much at once","one step","you don’t need to carry all","God is not rushing you"];
 }
 if(state==="gravity"){
  steps=["you feel heavy","that’s okay","rest","you are not alone"];
 }
 if(state==="static"){
  steps=["too much noise","slow down","focus on one thing","return to calm"];
 }

}

function show(){
 document.getElementById("text").innerText=steps[i];
}

function next(){
 i++;
 if(i<steps.length) show();
 else home();
}

// LEARN MODE
function buildLearn(){

 let t="", info="";

 if(state==="heat"){
  t="overwhelm";
  info="your nervous system is overloaded. too much input, not enough processing. reduce stimulation, breathe slowly, simplify.";
 }

 if(state==="threat"){
  t="anxiety";
  info="your brain is scanning for danger. this does not always mean danger is real. orient to the present moment.";
 }

 if(state==="pressure"){
  t="pressure";
  info="too many demands at once. your mind cannot prioritize. break things into one small step.";
 }

 if(state==="gravity"){
  t="low state";
  info="your system is conserving energy. this is not failure. rest and reduce expectations.";
 }

 if(state==="static"){
  t="mental noise";
  info="overstimulation. your brain needs less input, not more. slow everything down.";
 }

 document.getElementById("text").innerText=t;
 document.getElementById("info").innerText=info;
}

// home
function home(){
 location.reload();
}

</script>

</body>
</html>
