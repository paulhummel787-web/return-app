<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 overflow:hidden;
 font-family:-apple-system;
 color:#e8e6e3;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 background:#050505;
}

/* 🌌 BACKGROUND */
#glow{
 position:fixed;
 width:200%;
 height:200%;
 top:-50%;
 left:-50%;
 background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
 animation: drift 25s infinite linear;
}

@keyframes drift{
 0%{transform:translate(0,0);}
 50%{transform:translate(30px,30px);}
 100%{transform:translate(0,0);}
}

/* ✨ PARTICLES */
.particle{
 position:fixed;
 width:3px;
 height:3px;
 background:white;
 border-radius:50%;
 opacity:.15;
 animation: float linear infinite;
}

@keyframes float{
 from{transform:translateY(100vh);}
 to{transform:translateY(-10vh);}
}

/* UI */
#app{max-width:360px;width:100%;text-align:center;}

.choice{
 margin:10px 0;
 padding:14px;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
}

.active{background:rgba(255,255,255,0.2);}

.breath{
 width:150px;height:150px;margin:20px auto;border-radius:50%;
 background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
 animation:breathe 8s infinite ease-in-out;
}

@keyframes breathe{
 0%{transform:scale(.8);}
 50%{transform:scale(1.25);}
 100%{transform:scale(.8);}
}

.small{
 margin-top:10px;
 padding:10px;
 border:none;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
 color:white;
}
</style>
</head>

<body>

<div id="glow"></div>

<div id="app">

<!-- HOME -->
<div id="home">
<h2>return</h2>
<div class="choice" onclick="nav('select')">begin</div>
<div class="choice" onclick="nav('insight')">insight</div>
</div>

<!-- SELECT -->
<div id="select" style="display:none;">
<h2>what are you feeling</h2>

<div class="choice" onclick="toggle('heat',this)">overwhelmed</div>
<div class="choice" onclick="toggle('threat',this)">anxious</div>
<div class="choice" onclick="toggle('pressure',this)">pressure</div>
<div class="choice" onclick="toggle('gravity',this)">low</div>
<div class="choice" onclick="toggle('static',this)">scattered</div>

<button class="small" onclick="start()">enter</button>
<button class="small" onclick="nav('home')">back</button>
</div>

<!-- FLOW -->
<div id="flow" style="display:none;">
<div class="breath"></div>
<div id="text"></div>
</div>

<!-- INSIGHT -->
<div id="insight" style="display:none;">
<h2>insight</h2>
<div id="insightText"></div>
<button class="small" onclick="nav('home')">back</button>
</div>

</div>

<script>

// 🌌 PARTICLES
for(let i=0;i<35;i++){
 let p=document.createElement("div");
 p.className="particle";
 p.style.left=Math.random()*100+"vw";
 p.style.animationDuration=(10+Math.random()*20)+"s";
 document.body.appendChild(p);
}

// NAV
function nav(id){
 clearInterval(flowInterval);
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById(id).style.display="block";
}

// 🧠 STATE SYSTEM
let selected=[];

function toggle(state,el){
 if(selected.includes(state)){
  selected=selected.filter(s=>s!==state);
  el.classList.remove("active");
 } else {
  selected.push(state);
  el.classList.add("active");
 }
}

// 🧠 ENGINE (builds response)
function buildFlow(){

 let steps=[];

 // CLARITY FIRST
 if(selected.includes("heat"))
  steps.push("this is a lot right now");

 if(selected.includes("threat"))
  steps.push("your mind is trying to protect you");

 if(selected.includes("pressure"))
  steps.push("you are carrying a lot");

 if(selected.includes("gravity"))
  steps.push("your energy is low");

 if(selected.includes("static"))
  steps.push("your attention is scattered");

 // REGULATION
 steps.push("slow your breathing");
 steps.push("you are safe");
 steps.push("stay here");

 return steps;
}

// 🌊 FLOW SYSTEM
let flowSteps=[],flowIndex=0,flowInterval;

function start(){
 if(selected.length===0){
  alert("select at least one state");
  return;
 }

 flowSteps=buildFlow();
 flowIndex=0;

 nav("flow");
 runFlow();
}

function runFlow(){
 showStep();

 flowInterval=setInterval(()=>{
  flowIndex++;

  if(flowIndex < flowSteps.length){
   showStep();
  } else {
   nav("home");
   selected=[];
  }

 },4000);
}

function showStep(){
 let text=flowSteps[flowIndex];
 document.getElementById("text").innerText=text;
 speak(text);
}

// 🎧 VOICE
function speak(text){
 let msg=new SpeechSynthesisUtterance(text);
 msg.rate=0.85;
 speechSynthesis.cancel();
 speechSynthesis.speak(msg);
}

// 📊 INSIGHT SYSTEM (basic version)
function generateInsight(){

 if(selected.length===0){
  return "start using the app to see patterns";
 }

 return "you are experiencing: " + selected.join(", ");
}

// load insight
document.getElementById("insightText").innerText = "use the app to build insight over time";

</script>

</body>
</html>
