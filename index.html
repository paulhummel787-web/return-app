<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:-apple-system;
 overflow:hidden;
 color:#e8e6e3;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 text-align:center;
 background:#050505;
}

#bg{
 position:fixed;
 width:200%;
 height:200%;
 top:-50%;
 left:-50%;
 background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
 animation: move 20s infinite linear;
}

@keyframes move{
 0%{transform:translate(0,0);}
 50%{transform:translate(20px,20px);}
 100%{transform:translate(0,0);}
}

#app{max-width:360px;width:100%;position:relative;z-index:2;}

.choice{
 margin:8px 0;
 padding:14px;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
}

.active{background:rgba(255,255,255,0.2);}

.breath{
 width:150px;height:150px;margin:20px auto;border-radius:50%;
 background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
 animation:breathe 8s infinite ease-in-out;
}

@keyframes breathe{
 0%{transform:scale(.8);}
 50%{transform:scale(1.25);}
 100%{transform:scale(.8);}
}

.small{
 margin-top:10px;
 padding:10px;
 border:none;
 border-radius:999px;
 background:rgba(255,255,255,0.05);
 color:white;
}

input{
 width:85%;
 padding:10px;
 border-radius:10px;
 border:none;
 margin-top:10px;
 background:rgba(255,255,255,0.05);
 color:white;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="app">

<!-- HOME -->
<div id="home">
<h2>return</h2>
<div class="choice" onclick="nav('select')">begin</div>
<div class="choice" onclick="nav('chat')">talk</div>
<div class="choice" onclick="insight()">insight</div>
</div>

<!-- SELECT -->
<div id="select" style="display:none;">
<h2>what are you feeling</h2>

<div class="choice" onclick="toggle('heat',this)">overwhelmed</div>
<div class="choice" onclick="toggle('threat',this)">anxious</div>
<div class="choice" onclick="toggle('pressure',this)">pressure</div>
<div class="choice" onclick="toggle('gravity',this)">low</div>
<div class="choice" onclick="toggle('static',this)">scattered</div>

<button class="small" onclick="start()">enter</button>
</div>

<!-- FLOW -->
<div id="flow" style="display:none;">
<div class="breath"></div>
<div id="text"></div>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">
<h2>talk</h2>
<div id="chatBox"></div>
<input id="input" placeholder="say what's on your mind">
<button class="small" onclick="send()">send</button>
<button class="small" onclick="nav('home')">back</button>
</div>

<!-- INSIGHT -->
<div id="insight" style="display:none;">
<h2>pattern</h2>
<div id="insightText"></div>
<button class="small" onclick="nav('home')">back</button>
</div>

</div>

<script>

let selected=[],steps=[],i=0,interval;

// NAV
function nav(id){
 clearInterval(interval);
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById(id).style.display="block";
}

// SELECT
function toggle(s,el){
 if(selected.includes(s)){
  selected=selected.filter(x=>x!==s);
  el.classList.remove("active");
 } else {
  selected.push(s);
  el.classList.add("active");
 }
}

// START FLOW
function start(){
 nav("flow");
 build();
 i=0;
 runFlow();

 let data=JSON.parse(localStorage.getItem("states")||"[]");
 data.push(selected);
 localStorage.setItem("states",JSON.stringify(data));
}

// FLOW
function build(){
 steps=[
  "pause",
  "slow your breathing",
  "you are not in danger",
  "stay here"
 ];
}

function runFlow(){
 show();
 interval=setInterval(()=>{
  i++;
  if(i<steps.length) show();
  else nav("home");
 },4000);
}

function show(){
 document.getElementById("text").innerText=steps[i];
 speak(steps[i]);
}

// VOICE
function speak(t){
 let m=new SpeechSynthesisUtterance(t);
 m.rate=0.8;
 speechSynthesis.cancel();
 speechSynthesis.speak(m);
}

// 🤖 CHAT (AI-LIKE)
function send(){
 let input=document.getElementById("input").value.toLowerCase();
 let response="";

 if(input.includes("overwhelmed"))
  response="it sounds like too much is happening at once. slow it down. one thing at a time.";

 else if(input.includes("anxious"))
  response="your mind is trying to protect you. that doesn’t always mean you’re in danger.";

 else
  response="i’m here. slow down and tell me more.";

 let box=document.getElementById("chatBox");
 box.innerHTML+="<div>"+input+"</div><div style='opacity:.6'>"+response+"</div>";

 document.getElementById("input").value="";
}

// INSIGHT
function insight(){
 nav("insight");
 let data=JSON.parse(localStorage.getItem("states")||"[]");

 let combos={};
 data.forEach(arr=>{
 let key=arr.sort().join("+");
 combos[key]=(combos[key]||0)+1;
 });

 let top=Object.entries(combos).sort((a,b)=>b[1]-a[1])[0];

 document.getElementById("insightText").innerText=
 top ? "you often feel "+top[0].replaceAll("+"," + ") : "not enough data yet";
}

</script>

</body>
</html>
