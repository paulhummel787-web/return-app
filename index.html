<!DOCTYPE html>
<html>
<head>
  <title>Return</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: radial-gradient(circle at top, #1a1d24, #0f1115);
      color: #e8e6e3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    #app {
      max-width: 320px;
      width: 100%;
    }

    h2 {
      font-weight: 500;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .btn {
      display: block;
      margin: 12px auto;
      padding: 16px;
      border-radius: 20px;
      color: white;
      border: none;
      width: 100%;
      font-size: 17px;
    }

    .y { background: #bfa76f; }
    .r { background: #b85c5c; }
    .o { background: #c98a4b; }
    .p { background: #8b6fa8; }
    .b { background: #5f7c99; }

    #text {
      font-size: 20px;
      line-height: 1.6;
      margin: 20px 0;
      min-height: 100px;
    }

    button.small {
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
    }
  </style>
</head>

<body>

<div id="app">

  <div id="home">
    <h2>be still</h2>
    <button class="btn y" onclick="show('static')">🟡 static</button>
    <button class="btn r" onclick="show('heat')">🔴 heat</button>
    <button class="btn o" onclick="show('threat')">🟠 threat</button>
    <button class="btn p" onclick="show('pressure')">🟣 pressure</button>
    <button class="btn b" onclick="show('gravity')">🔵 gravity</button>
  </div>

  <div id="state" style="display:none;">
    <div id="text"></div>
    <button class="small" onclick="next()">continue</button>
  </div>

  <div id="next" style="display:none;">
    <p>just begin<br>one small step<br>God meets you here</p>
    <button class="small" onclick="home()">done</button>
  </div>

</div>

<script>

let steps = [];
let currentStep = 0;

// ✅ Voice (safe for iPhone)
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.85;
  msg.pitch = 1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

// ✅ Show state
function show(state) {
  document.getElementById("home").style.display = "none";
  document.getElementById("state").style.display = "block";

  if (state === "heat") {
    steps = [
      "you feel overwhelmed",
      "pause",
      "breathe in slowly",
      "hold",
      "release",
      "you are not in danger",
      "God is near to you"
    ];
  }

  if (state === "threat") {
    steps = [
      "something feels wrong",
      "look around",
      "name 3 things you see",
      "you are safe enough",
      "come back to the present"
    ];
  }

  if (state === "pressure") {
    steps = [
      "too much at once",
      "you don’t need to solve everything",
      "just the next 5 minutes",
      "start small"
    ];
  }

  if (state === "gravity") {
    steps = [
      "you feel heavy",
      "that’s okay",
      "rest or move gently",
      "you don’t need to push right now"
    ];
  }

  if (state === "static") {
    steps = [
      "too much input",
      "slow down",
      "one thing at a time",
      "choose what matters most"
    ];
  }

  currentStep = 0;
  showStep();
}

// ✅ Show each step (tap to continue = reliable)
function showStep() {
  const currentText = steps[currentStep];
  document.getElementById("text").innerText = currentText;
  speak(currentText);
}

// ✅ Next step
function next() {
  currentStep++;

  if (currentStep < steps.length) {
    showStep();
  } else {
    document.getElementById("state").style.display = "none";
    document.getElementById("next").style.display = "block";
  }
}

// ✅ Back home
function home() {
  document.getElementById("next").style.display = "none";
  document.getElementById("home").style.display = "block";
}

</script>

</body>
</html>
