<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect OS</title>
    <style>
        :root {
            --bg: #020617; --card: #1e293b; --accent: #38bdf8;
            --yellow: #fde047; --red: #f87171; --orange: #fb923c; --purple: #c084fc; --blue: #60a5fa;
            --green: #22c55e; --fox: #fb923c;
        }

        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            color: white; background: var(--bg); transition: background 0.5s ease;
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
        }

        .container { padding: 20px; max-width: 420px; margin: auto; padding-bottom: 120px; }

        /* SURVIVAL OVERRIDE */
        body.survival-mode { background: #000 !important; }
        body.survival-mode #nav, body.survival-mode .pilot-only { display: none !important; }

        /* Typography & Layout */
        h1, h2 { font-weight: 800; letter-spacing: -0.5px; text-align: center; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .tab { display: none; }
        .active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Elements */
        .state-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .state-btn { padding: 22px 10px; border-radius: 16px; border: none; font-weight: 900; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #000; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }

        .btn { padding: 18px; border-radius: 14px; background: #334155; border: none; color: white; width: 100%; margin: 10px 0; font-weight: bold; cursor: pointer; display: block; text-align: center; text-decoration: none; font-size: 1rem; }
        .btn-fox { border: 2px solid var(--fox); color: var(--fox); background: rgba(251, 146, 60, 0.05); }
        .btn-mvs { border: 2px dashed var(--accent); color: var(--accent); background: rgba(56, 189, 248, 0.05); }

        /* Truth Anchors */
        .anchor-box { border-left: 4px solid var(--accent); padding: 15px; background: rgba(255,255,255,0.03); margin: 20px 0; border-radius: 0 16px 16px 0; }
        .scripture { font-size: 0.8rem; color: var(--accent); font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .truth-text { font-size: 1.1rem; font-style: italic; line-height: 1.5; opacity: 0.95; }
        .affirmation { margin-top: 12px; font-weight: 800; font-size: 1.1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }

        /* Input Styles */
        input, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 12px; padding: 15px; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; }

        /* Nav */
        #nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: rgba(2,6,23,0.9); backdrop-filter: blur(20px); padding: 20px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { opacity: 0.4; font-size: 0.65rem; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; }
        .nav-item.active { opacity: 1; color: var(--accent); }

        .status-badge { font-size: 0.7rem; font-weight: 900; padding: 4px 8px; border-radius: 6px; background: var(--accent); color: black; float: right; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="reset" class="tab active">
        <h2 id="headerTitle">PILOT STATUS</h2>
        
        <div id="survivalCard" style="display:none;">
            <div class="card" id="stateHeader">
                <h1 id="survivalColorName" style="margin:0; font-size: 3rem;"></h1>
                <p id="survivalAction" style="font-size: 1.1rem; margin: 15px 0; font-weight: 600;"></p>
            </div>

            <div class="anchor-box">
                <div id="scriptureRef" class="scripture"></div>
                <div id="truthText" class="truth-text"></div>
                <div id="affirmationText" class="affirmation"></div>
            </div>

            <button class="btn" onclick="exitSurvival()" style="background:var(--accent); color:black; font-size:1.2rem; margin-top:20px;">I AM STABILIZED</button>
        </div>

        <div id="normalStatus">
            <div class="card">
                <span id="recoveryBadge" class="status-badge" style="display:none;">RECOVERY ACTIVE</span>
                <p style="margin:0; font-size:0.9rem; font-weight: 500;">Current Load: <span id="capacity">70% Governor Active</span></p>
            </div>

            <div class="state-grid">
                <button class="state-btn" style="background:var(--yellow);" onclick="enterSurvival('YELLOW')">🟡 STATIC<br>ADHD</button>
                <button class="state-btn" style="background:var(--red);" onclick="enterSurvival('RED')">🔴 HEAT<br>BPD</button>
                <button class="state-btn" style="background:var(--orange);" onclick="enterSurvival('ORANGE')">🟠 THREAT<br>CPTSD</button>
                <button class="state-btn" style="background:var(--purple);" onclick="enterSurvival('PURPLE')">🟣 PRESSURE<br>GAD</button>
                <button class="state-btn" style="background:var(--blue); color:white" onclick="enterSurvival('BLUE')">🔵 GRAVITY<br>MDD</button>
                <button class="state-btn" style="background:var(--green);" onclick="enterSurvival('GREEN')">🟢 CLEAR<br>PILOT</button>
            </div>
            
            <p style="text-align:center; font-size: 0.7rem; opacity: 0.5; margin-top: 20px;">10 MINS SPIRAL = COLD WATER | 20 MINS STUCK = RESET</p>
        </div>
    </div>

    <div id="architect" class="tab pilot-only">
        <h2>THE ARCHITECT</h2>
        
        <div class="card">
            <label style="color:var(--fox); font-weight:900; font-size:0.7rem;">🦊 THE GREAT FOX (ONE WIN)</label>
            <h3 id="foxDisplay" style="margin:10px 0;">[No Fox Locked]</h3>
            <input type="text" id="foxInput" placeholder="Define the weekly win...">
            <button class="btn btn-fox" onclick="saveFox()">LOCK FOX</button>
        </div>

        <div class="card">
            <label style="font-weight:900; font-size:0.7rem;">👻 GHOST DECODER (MVS)</label>
            <input type="text" id="complexTask" placeholder="Enter task name...">
            <button class="btn btn-mvs" onclick="unzipTask()">UNZIP MOVEMENTS</button>
            <div id="unzipResult" style="display:none; margin-top:15px; border-top: 1px solid #444; padding-top:10px;">
                <ol id="movementList" style="padding-left:20px; line-height:1.8;"></ol>
            </div>
        </div>
    </div>

    <div id="memory" class="tab pilot-only">
        <h2>MEMORY SHIELD</h2>
        <div class="card">
            <textarea id="memoInput" rows="5" placeholder="Log symptom or truth before memory blackout..."></textarea>
            <button class="btn" style="background:var(--accent); color:black" onclick="saveMemo()">SHIELD MEMORY</button>
        </div>
        <div id="memoList"></div>
    </div>

</div>

<div id="nav">
    <div class="nav-item active" onclick="showTab('reset', this)">RESET</div>
    <div class="nav-item" onclick="showTab('architect', this)">ENGINE</div>
    <div class="nav-item" onclick="showTab('memory', this)">MEMORY</div>
</div>

<script>
    const dataMap = {
        'YELLOW': { 
            act: 'REDUCE: Noise-canceling on. Close all tabs. Pick 1 task.',
            ref: 'Psalm 142:3', truth: 'When my spirit was overwhelmed within me, You knew my path.', affirm: 'Even when I don\'t know the way, God has the map.',
            speech: 'Yellow state. High static. Reduce input now.'
        },
        'RED': { 
            act: 'REGULATE: COLD SHOCK. Splash face with ice water.',
            ref: 'Romans 8:38', truth: 'Nothing can separate me from the love of God.', affirm: 'I am inseparable from Love. It cannot be taken.',
            speech: 'Red state. High heat. Use the ice now.'
        },
        'ORANGE': { 
            act: 'SAFEGUARD: 5-4-3-2-1 Grounding. Weighted blanket.',
            ref: 'Deuteronomy 31:8', truth: 'He will never leave you nor forsake you.', affirm: 'I am never alone. God is already in my tomorrow.',
            speech: 'Orange state. Threat detected. Ground yourself.'
        },
        'PURPLE': { 
            act: 'SIMPLIFY: Next 5 minutes only. Offload thoughts to paper.',
            ref: '2 Timothy 1:7', truth: 'God has not given me a spirit of fear, but of power and a sound mind.', affirm: 'I reject fear. I have a sound and clear mind.',
            speech: 'Purple state. High pressure. Simplify the next five minutes.'
        },
        'BLUE': { 
            act: 'COMPASSION: Power-save mode. Rest is the task. No guilt.',
            ref: 'Psalm 55:22', truth: 'Cast your cares on the Lord and He will sustain you.', affirm: 'I am sustained. I give God my weight.',
            speech: 'Blue state. High gravity. Power down with compassion.'
        },
        'GREEN': { 
            act: 'PILOT ONLINE: 70% Governor active. Proceed with the Fox.',
            ref: 'Philippians 4:13', truth: 'I can do all things through Christ who strengthens me.', affirm: 'I have enough strength for this one next step.',
            speech: 'Green state. Pilot is online. Take the next step.'
        }
    };

    function speak(t) {
        window.speechSynthesis.cancel();
        let m = new SpeechSynthesisUtterance(t);
        m.rate = 0.85; window.speechSynthesis.speak(m);
    }

    function enterSurvival(color) {
        document.body.classList.add('survival-mode');
        document.getElementById('normalStatus').style.display = 'none';
        document.getElementById('survivalCard').style.display = 'block';
        document.getElementById('headerTitle').innerText = "TRUTH ANCHOR";
        
        const d = dataMap[color];
        document.getElementById('survivalColorName').innerText = color;
        document.getElementById('survivalColorName').style.color = `var(--${color.toLowerCase()})`;
        document.getElementById('survivalAction').innerText = d.act;
        document.getElementById('scriptureRef').innerText = d.ref;
        document.getElementById('truthText').innerText = d.truth;
        document.getElementById('affirmationText').innerText = d.affirm;
        speak(d.speech);
    }

    function exitSurvival() {
        document.body.classList.remove('survival-mode');
        document.getElementById('normalStatus').style.display = 'block';
        document.getElementById('survivalCard').style.display = 'none';
        document.getElementById('headerTitle').innerText = "PILOT STATUS";
        localStorage.setItem('lastSpike', Date.now());
        checkRecovery();
    }

    function checkRecovery() {
        const last = localStorage.getItem('lastSpike');
        if (last && (Date.now() - last < 259200000)) { // 72 Hours
            document.getElementById('recoveryBadge').style.display = 'block';
        }
    }

    function saveFox() {
        const val = document.getElementById('foxInput').value;
        if(val) {
            localStorage.setItem('weeklyFox', val);
            document.getElementById('foxDisplay').innerText = val;
            document.getElementById('foxInput').value = '';
        }
    }

    function unzipTask() {
        const t = document.getElementById('complexTask').value;
        const list = document.getElementById('movementList');
        document.getElementById('unzipResult').style.display = 'block';
        list.innerHTML = `<li>Go to where ${t} happens.</li><li>Touch one object related to ${t}.</li><li>Do exactly 2 minutes of it. Stop.</li>`;
    }

    function saveMemo() {
        const m = document.getElementById('memoInput').value;
        if(m) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = m;
            document.getElementById('memoList').prepend(div);
            document.getElementById('memoInput').value = '';
        }
    }

    function showTab(id, el) {
        if(document.body.classList.contains('survival-mode')) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    window.onload = () => {
        const f = localStorage.getItem('weeklyFox');
        if(f) document.getElementById('foxDisplay').innerText = f;
        checkRecovery();
    };
</script>
</body>
</html>
