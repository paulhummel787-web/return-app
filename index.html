<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:-apple-system;
 color:#e8e6e3;
 text-align:center;
 transition:0.5s;
}

body.yellow{background:linear-gradient(#3a3a1a,#1f1f0f);}
body.red{background:linear-gradient(#3a1a1a,#1a0f0f);}
body.orange{background:linear-gradient(#3a261a,#1f140f);}
body.purple{background:linear-gradient(#2a1a3a,#140f1f);}
body.blue{background:linear-gradient(#1a253a,#0f1624);}

#app{max-width:420px;margin:auto;padding:20px;}

.btn{
 margin:8px 0;
 padding:14px;
 border-radius:999px;
 background:rgba(255,255,255,0.08);
}

input, textarea{
 width:90%;
 padding:10px;
 margin:5px 0;
 border-radius:10px;
 border:none;
}

.breath{
 width:120px;height:120px;margin:20px auto;border-radius:50%;
 background:rgba(255,255,255,0.1);
 animation:breathe 6s infinite;
}

@keyframes breathe{
 0%{transform:scale(.8);}
 50%{transform:scale(1.2);}
 100%{transform:scale(.8);}
}

.tabbar{
 position:fixed;
 bottom:0;
 width:100%;
 max-width:420px;
 display:flex;
 justify-content:space-around;
 background:#111;
 padding:10px 0;
}

.tab{font-size:12px;opacity:0.6;}
.tab.active{opacity:1;}
</style>
</head>

<body class="yellow">

<div id="app">

<!-- HOME -->
<div id="home">
<h2>return</h2>
<div class="btn" onclick="nav('checkin')">check in</div>
<div class="btn" onclick="nav('clarity')">clarity</div>
<div class="btn" onclick="nav('dump')">brain dump</div>
<div class="btn" onclick="nav('reset')">regulate</div>
<div id="homeInsight" style="margin-top:20px;opacity:0.7;"></div>
</div>

<!-- RESET -->
<div id="reset" style="display:none;">
<h2>state</h2>
<div class="btn" onclick="setState('yellow')">🟡</div>
<div class="btn" onclick="setState('red')">🔴</div>
<div class="btn" onclick="setState('orange')">🟠</div>
<div class="btn" onclick="setState('purple')">🟣</div>
<div class="btn" onclick="setState('blue')">🔵</div>
<div class="breath"></div>
<div id="resetText"></div>
</div>

<!-- CHECKIN -->
<div id="checkin" style="display:none;">
<h2>check in</h2>
<input id="intent" placeholder="what matters today">
<div class="btn" onclick="setCheck('yellow')">🟡</div>
<div class="btn" onclick="setCheck('red')">🔴</div>
<div class="btn" onclick="setCheck('orange')">🟠</div>
<div class="btn" onclick="setCheck('purple')">🟣</div>
<div class="btn" onclick="setCheck('blue')">🔵</div>
<div class="btn" onclick="runCheck()">begin</div>
<div id="checkOutput"></div>
</div>

<!-- CLARITY -->
<div id="clarity" style="display:none;">
<h2>clarity</h2>
<input id="fox" placeholder="your focus">
<div class="btn" onclick="pickState('yellow',this)">🟡</div>
<div class="btn" onclick="pickState('red',this)">🔴</div>
<div class="btn" onclick="pickState('orange',this)">🟠</div>
<div class="btn" onclick="pickState('purple',this)">🟣</div>
<div class="btn" onclick="pickState('blue',this)">🔵</div>
<div class="btn" onclick="runDay()">run</div>
<div id="clarityText"></div>
<div class="btn" onclick="completeTask()">i did it</div>
</div>

<!-- DUMP -->
<div id="dump" style="display:none;">
<h2>brain dump</h2>
<textarea id="dumpInput"></textarea>
<div class="btn" onclick="processDump()">clarify</div>
<div id="dumpOutput"></div>
</div>

</div>

<div class="tabbar">
<div class="tab active" onclick="nav('home',this)">home</div>
<div class="tab" onclick="nav('reset',this)">reset</div>
<div class="tab" onclick="nav('clarity',this)">clarity</div>
<div class="tab" onclick="nav('dump',this)">dump</div>
</div>

<script>

// NAV
function nav(id,el){
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById(id).style.display="block";
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 if(el) el.classList.add("active");
 if(id==="home") updateHome();
}

// STATE
function setState(s){
 document.body.className=s;
 resetText.innerText=getAdaptiveScripture(s);
 save(s);
}

// SCRIPTURE
const scriptures={
 red:["be still and know","the lord is near","do not fear"],
 orange:["you are safe","peace be with you"],
 purple:["trust in the lord","renew your mind"],
 blue:["come to me and rest","strength will return"],
 yellow:["be still","quiet your mind"]
};

function getAdaptiveScripture(s){
 let list=scriptures[s]||["stay steady"];
 return list[Math.floor(Math.random()*list.length)];
}

// COACH
function getCoachMessage(s){
 let map={
  red:"stop pushing",
  purple:"stop thinking",
  blue:"rest first",
  yellow:"reduce input",
  orange:"you are safe"
 };
 return map[s]||"stay steady";
}

// CHECKIN
let checkState=null;
function setCheck(s){checkState=s;}
function runCheck(){
 let intent=document.getElementById("intent").value;
 checkOutput.innerText=getCoachMessage(checkState)+"\n\n"+intent;
 save(checkState);
 logUsage();
}

// CLARITY
let currentState=null;
function pickState(s){currentState=s;}

function runDay(){
 let fox=document.getElementById("fox").value||"task";
 clarityText.innerText=getCoachMessage(currentState)+"\n\n"+fox;
 saveTask(fox);
 save(currentState);
 logUsage();
}

// DUMP
function processDump(){

 let text=document.getElementById("dumpInput").value.toLowerCase();

 let lines=text.split(/[\n,.]/).map(l=>l.trim()).filter(l=>l);

 let tasks=[],worries=[];

 lines.forEach(l=>{
  if(l.includes("feel")) worries.push(l);
  else tasks.push(l);
 });

 tasks.sort((a,b)=>a.length-b.length);

 let top=tasks[0]||"start small";

 dumpOutput.innerText=
 "focus:\n"+top+
 "\n\nstep:\nopen → 2 min";

 saveTask(top);
 logUsage();
}

// TASKS
function saveTask(task){
 let t=JSON.parse(localStorage.getItem("tasks")||"[]");
 t.push({task,completed:false});
 localStorage.setItem("tasks",JSON.stringify(t));
}

function completeTask(){
 let t=JSON.parse(localStorage.getItem("tasks")||"[]");
 if(t.length) t[t.length-1].completed=true;
 localStorage.setItem("tasks",JSON.stringify(t));
}

// DATA
function save(s){
 let d=JSON.parse(localStorage.getItem("data")||"[]");
 d.push({state:s});
 localStorage.setItem("data",JSON.stringify(d));
}

// STREAK
function logUsage(){
 let today=new Date().toDateString();
 let u=JSON.parse(localStorage.getItem("usage")||"[]");
 if(u[u.length-1]!==today) u.push(today);
 localStorage.setItem("usage",JSON.stringify(u));
}

function getStreak(){
 let u=JSON.parse(localStorage.getItem("usage")||"[]");
 return u.length;
}

function getMomentum(){
 let s=getStreak();
 if(s<3) return "build";
 if(s<7) return "consistent";
 return "identity";
}

// HOME
function updateHome(){

 let d=JSON.parse(localStorage.getItem("data")||"[]");

 let last=d.length?d[d.length-1].state:null;

 let coach=last?getCoachMessage(last):"start";

 homeInsight.innerText=
 coach+
 "\n\n🔥 streak: "+getStreak()+
 "\n"+getMomentum();
}

</script>

</body>
</html>
