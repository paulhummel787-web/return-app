<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architect OS ∞</title>

<style>
body{
 margin:0;
 font-family:-apple-system;
 color:white;
 text-align:center;
 transition:1s;
 background:#020617;
}

/* STATE BACKGROUNDS */
body.RED{background:radial-gradient(circle,#3b0a0a,#020617);}
body.BLUE{background:radial-gradient(circle,#0a1b3b,#020617);}
body.YELLOW{background:radial-gradient(circle,#3b360a,#020617);}
body.GREEN{background:radial-gradient(circle,#0a3b1f,#020617);}

/* LIVING GLOW */
body::before{
 content:"";
 position:fixed;
 width:100%;
 height:100%;
 background:radial-gradient(circle,rgba(255,255,255,0.08),transparent);
 animation:pulse 6s infinite;
 pointer-events:none;
}

@keyframes pulse{
 0%{opacity:0.3;}
 50%{opacity:0.7;}
 100%{opacity:0.3;}
}

.dashboard{max-width:420px;margin:auto;padding:20px;}

.card{
 background:rgba(30,41,59,0.4);
 border-radius:20px;
 padding:20px;
 margin-bottom:15px;
 backdrop-filter:blur(10px);
}

.btn{
 padding:14px;
 margin:6px 0;
 border:none;
 border-radius:12px;
 width:100%;
 background:#1e293b;
 color:white;
 font-weight:bold;
}

input,textarea{
 width:100%;
 padding:10px;
 border-radius:10px;
 border:none;
 margin-bottom:10px;
}

#stepText{font-size:20px;margin-top:10px;}
#timer{font-size:28px;margin-top:10px;}

.breath{
 width:120px;height:120px;margin:20px auto;
 border-radius:50%;
 background:rgba(255,255,255,0.1);
 animation:breathe 6s infinite;
}

@keyframes breathe{
 0%{transform:scale(.8);}
 50%{transform:scale(1.2);}
 100%{transform:scale(.8);}
}
</style>
</head>

<body>

<div class="dashboard">

<div class="card">
<h2 id="mode">MODE</h2>
<p id="status"></p>
<p id="coach"></p>
<p id="scripture" style="opacity:0.7;"></p>
<div class="breath"></div>
</div>

<div class="card">
<h3>Log State</h3>
<button class="btn" onclick="log('YELLOW')">Static</button>
<button class="btn" onclick="log('RED')">Overload</button>
<button class="btn" onclick="log('BLUE')">Shutdown</button>
<button class="btn" onclick="log('GREEN')">Aligned</button>
</div>

<div class="card">
<h3>Brain Dump</h3>
<textarea id="dump"></textarea>
<button class="btn" onclick="processDump()">Process</button>
<p id="dumpOut"></p>
</div>

<div class="card">
<h3>Clarity Engine</h3>
<input id="focus" placeholder="Focus task">
<button class="btn" onclick="runClarity()">Start</button>

<div id="stepBox" style="display:none;">
<p id="stepText"></p>
<p id="timer"></p>
<button class="btn" onclick="nextStep()">Next</button>
</div>
</div>

<div class="card">
<h3>Momentum</h3>
<p id="momentum"></p>
<button class="btn" onclick="reset()">Reset</button>
</div>

</div>

<script>

// ---------- VOICE ----------
function speak(text){
 let msg=new SpeechSynthesisUtterance(text);
 msg.rate=0.9;
 msg.pitch=0.9;
 speechSynthesis.cancel();
 speechSynthesis.speak(msg);
}

// ---------- DATA ----------
const W={YELLOW:8,RED:15,BLUE:16,GREEN:20};

// ---------- LOG ----------
function log(state){

 let d=JSON.parse(localStorage.log||"[]");
 d.push({t:Date.now(),s:state});
 localStorage.log=JSON.stringify(d);

 document.body.className=state;

 update();
 autoGuide(state);
}

// ---------- TODAY ----------
function today(){
 let d=JSON.parse(localStorage.log||"[]");
 let t=new Date().toDateString();
 return d.filter(e=>new Date(e.t).toDateString()===t);
}

// ---------- MODE ----------
function detect(){

 let d=today().slice(-3);

 if(d.length>=3 && d.every(e=>e.s==="RED")) return "RECOVERY";
 if(d.length>=2 && d.every(e=>e.s==="BLUE")) return "RESET";

 let score=d.reduce((s,e)=>s+(W[e.s]||10),0);

 if(score>40) return "WORK";
 return "SPIRITUAL";
}

// ---------- COACH ----------
function getCoach(m){
 return{
  WORK:"Execute. No hesitation.",
  RECOVERY:"Calm your system first.",
  RESET:"Stop everything.",
  SPIRITUAL:"Reconnect inward."
 }[m]||"Stay steady";
}

// ---------- SCRIPTURE ----------
function getScripture(m){
 let s={
  WORK:["Work as unto the Lord"],
  RECOVERY:["Be still and know"],
  RESET:["Come to me and rest"],
  SPIRITUAL:["Trust in the Lord"]
 };
 let a=s[m]||["Stay steady"];
 return a[Math.floor(Math.random()*a.length)];
}

// ---------- PATTERNS ----------
function getPatterns(){
 let d=JSON.parse(localStorage.log||"[]");
 let red=d.filter(e=>e.s==="RED").length;
 let blue=d.filter(e=>e.s==="BLUE").length;

 if(red>5) return "You’ve been pushing too hard.";
 if(blue>5) return "You may be burning out.";
 return "";
}

// ---------- AUTO GUIDE ----------
function autoGuide(state){

 let msg="";

 if(state==="RED") msg="Slow down. Breathe. You are safe.";
 if(state==="BLUE") msg="Rest. Nothing required.";
 if(state==="YELLOW") msg="Too much input. Reduce it.";
 if(state==="GREEN") msg="You're clear. Move forward.";

 status.innerText=msg;
 speak(msg);

 if(state==="GREEN") runClarity();
}

// ---------- UPDATE ----------
function update(){

 let m=detect();

 mode.innerText=m;

 coach.innerText=getCoach(m);
 scripture.innerText=getScripture(m);

 let pattern=getPatterns();
 if(pattern) status.innerText+="\n\n"+pattern;

 momentum.innerText="🔥 "+streak()+" day streak";
}

// ---------- STREAK ----------
function streak(){
 let u=JSON.parse(localStorage.u||"[]");
 let t=new Date().toDateString();
 if(u[u.length-1]!==t) u.push(t);
 localStorage.u=JSON.stringify(u);
 return u.length;
}

// ---------- DUMP ----------
function processDump(){
 let text=dump.value.toLowerCase();
 let lines=text.split(/[\n,.]/).filter(l=>l);
 let top=lines.sort((a,b)=>a.length-b.length)[0]||"start small";
 dumpOut.innerText="Focus → "+top;
 focus.value=top;
}

// ---------- CLARITY ----------
let steps=[],i=0,timerInt;

function runClarity(){

 let f=focus.value||"task";
 let m=detect();

 if(m==="RECOVERY"){
  steps=["Stop","Cold water","Breathe","Open "+f,"2 min"];
 }
 else if(m==="RESET"){
  steps=["Lie down","No input","Return later"];
 }
 else if(m==="SPIRITUAL"){
  steps=["Pray","Reflect","Open "+f,"Do small step"];
 }
 else{
  steps=["Open "+f,"2 min focus"];
 }

 i=0;
 stepBox.style.display="block";
 showStep();
}

// ---------- STEP ----------
function showStep(){
 stepText.innerText=steps[i];
 if(steps[i].includes("2 min")) startTimer(120);
 else timer.innerText="";
}

function nextStep(){
 i++;
 if(i<steps.length) showStep();
 else stepText.innerText="Complete";
}

// ---------- TIMER ----------
function startTimer(s){

 clearInterval(timerInt);
 let t=s;

 timerInt=setInterval(()=>{
  let m=Math.floor(t/60);
  let sec=t%60;

  timer.innerText=m+":"+(sec<10?"0":"")+sec;

  t--;

  if(t<0){
   clearInterval(timerInt);
   timer.innerText="Done";
  }
 },1000);
}

// ---------- RESET ----------
function reset(){
 localStorage.clear();
 location.reload();
}

// INIT
update();

</script>

</body>
</html>
